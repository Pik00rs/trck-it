const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --bg: #05060a;
  --bg-2: #080b13;
  --panel: rgba(12, 16, 26, 0.7);
  --line: rgba(0, 245, 255, 0.18);
  --line-hot: rgba(255, 42, 109, 0.35);
  --ink: #eaf6f8;
  --ink-soft: #b8d4d8;
  --dim: #6e8a95;
  --faint: #354650;
  --cy-cyan: #00f5ff;
  --cy-pink: #ff2a6d;
  --cy-yellow: #fff45a;
  --cy-green: #8fffb0;
  --cy-purple: #b27cff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); }

.app {
  position: relative;
  min-height: 100vh;
  background:
    radial-gradient(500px 400px at 15% -5%, rgba(0,245,255,0.08), transparent 60%),
    radial-gradient(500px 400px at 105% 10%, rgba(255,42,109,0.08), transparent 60%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  color: var(--ink);
  font-family: 'Chakra Petch', system-ui, sans-serif;
  padding: 8px 10px 24px;
  max-width: 540px;
  margin: 0 auto;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
/* Allow select in inputs */
.app input, .app select, .app textarea {
  -webkit-user-select: text;
  user-select: text;
}

.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(0deg,
    rgba(0,245,255,0.012) 0px, rgba(0,245,255,0.012) 1px,
    transparent 1px, transparent 3px);
  mix-blend-mode: overlay;
}

/* ── HEADER ───────────────────────────────────────────────────────── */
.top {
  display: flex; flex-direction: column;
  gap: 6px; padding: 8px 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 10px; position: relative;
}
.top::after {
  content: ''; position: absolute;
  left: 0; right: 0; bottom: -1px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cy-cyan), transparent);
  opacity: 0.6;
}
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
}
.brand { display: flex; gap: 8px; align-items: center; }
.logo-mark {
  color: var(--cy-cyan); font-size: 20px; line-height: 1;
  filter: drop-shadow(0 0 8px var(--cy-cyan));
  animation: flicker 3s infinite;
}
@keyframes flicker {
  0%,95%,100% { opacity: 1; }
  96%,98% { opacity: 0.3; }
}
.brand h1 {
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 700; font-size: 18px;
  letter-spacing: 0.12em; margin: 0; line-height: 1;
  color: var(--ink);
  text-shadow: 0 0 10px rgba(0,245,255,0.3);
}
.brand .accent { color: var(--cy-pink); }
.burger-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--cy-cyan);
  padding: 6px 10px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.burger-btn:active { background: rgba(0,245,255,0.1); }
.controls {
  display: flex; gap: 4px; align-items: center;
  flex-wrap: wrap;
  justify-content: flex-start;
  max-width: 100%;
}
.btn-label { padding: 6px 8px; }
.ctrl {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 8px;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--line);
  color: var(--cy-cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.ctrl.disabled { opacity: 0.3; pointer-events: none; }
.ctrl select {
  background: transparent; color: var(--cy-cyan);
  border: none; outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 12px; cursor: pointer;
}
.ctrl select option { background: var(--bg-2); }
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.05);
  color: var(--cy-cyan);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.btn:active { background: rgba(0,245,255,0.15); }
.btn:disabled { opacity: 0.25; }
.btn.on {
  background: var(--cy-yellow);
  color: var(--bg);
  border-color: var(--cy-yellow);
}

/* ── BURGER MENU ─────────────────────────────────────────────────── */
.burger-wrap {
  position: relative;
  display: inline-block;
}
.burger-icon {
  font-size: 14px; line-height: 1;
}
.burger-bg {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.3);
}
.burger-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  z-index: 60;
  background: var(--bg-2);
  border: 1px solid var(--cy-cyan);
  box-shadow: 0 4px 24px rgba(0,245,255,0.3);
  min-width: 180px;
  display: flex; flex-direction: column;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.burger-item {
  padding: 12px 16px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: var(--ink);
  font-family: 'Chakra Petch', sans-serif;
  font-size: 13px;
  font-weight: 600;
  text-align: left;
  cursor: pointer;
}
.burger-item:last-child { border-bottom: none; }
.burger-item:active { background: rgba(0,245,255,0.08); color: var(--cy-cyan); }
.burger-sep {
  height: 1px;
  background: var(--line);
  margin: 0;
}

/* ── CHIP DELETE (Settings) ──────────────────────────────────────── */
.ss-chip-wrap {
  display: inline-flex; align-items: center; gap: 0;
  position: relative;
}
.ss-chip-del {
  position: absolute;
  top: -4px; right: -4px;
  width: 14px; height: 14px;
  background: var(--cy-pink);
  color: var(--bg);
  border: none; border-radius: 50%;
  font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  padding: 0;
}
.ss-chip-del:active { opacity: 0.7; }

/* ── PLAYER OBSERVER EDIT ────────────────────────────────────────── */
.po-player-row {
  display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--line);
}
.po-player-row .po-player-btn {
  flex: 1; border-bottom: none;
}
.po-actions {
  display: flex; gap: 2px; flex-shrink: 0;
}
.po-edit-row {
  display: flex; align-items: center; gap: 4px;
  width: 100%; padding: 8px 0;
}
.po-confirm-row {
  display: flex; align-items: center; gap: 6px;
  width: 100%; padding: 8px 0;
}
.po-confirm-text {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.po-merge-target {
  color: var(--cy-pink);
  font-size: 16px;
  font-weight: 900;
  margin-left: auto;
}
.po-stat-clickable {
  cursor: pointer;
  transition: background 120ms;
}
.po-stat-clickable:active { background: rgba(0,245,255,0.1); }
.po-stat-active {
  background: rgba(255,42,109,0.12) !important;
  border: 1px solid var(--cy-pink);
}

.import-conflict {
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.04);
}
.import-conflict-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.import-conflict-name {
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 700; font-size: 13px;
  color: var(--ink);
}
.import-conflict-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
}
.import-conflict-choices {
  display: flex; gap: 4px;
}

.po-add-fixed {
  border-top: 1px solid var(--cy-cyan);
  padding: 10px 12px;
  background: var(--bg-2);
  flex-shrink: 0;
}
.po-add-row {
  display: flex; gap: 4px;
}
.po-add-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-yellow);
  padding-top: 4px;
}
.po-search-bar {
  padding: 6px 12px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

/* ── STATUS BAR ───────────────────────────────────────────────────── */
/* ── START SESSION ────────────────────────────────────────────────── */
.start-session-wrap {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 40px 10px;
  gap: 12px;
}
.start-session-btn {
  width: 100%;
  padding: 16px;
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 700; font-size: 16px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--cy-cyan);
  border: none; cursor: pointer;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  box-shadow: 0 0 30px rgba(0,245,255,0.4);
  animation: hum 1.5s ease-in-out infinite;
}
.start-session-btn:active { transform: scale(0.97); }
.start-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--dim);
  letter-spacing: 0.1em;
  text-align: center;
}

/* ── STATUS BAR ──────────────────────────────────────────────────── */
.status-bar {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 10px;
}
.sb-info {
  display: flex; gap: 4px; align-items: stretch; flex-wrap: wrap;
}
.status-item {
  flex: 1;
  min-width: 48px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 5px 3px;
  background: rgba(0,245,255,0.04);
  border: 1px solid var(--line);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.st-l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; letter-spacing: 0.2em;
  color: var(--cy-cyan); opacity: 0.7;
  text-transform: uppercase;
  line-height: 1;
}
.st-v {
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 700; font-size: 12px;
  line-height: 1.2; color: var(--ink);
  text-shadow: 0 0 6px var(--cy-cyan);
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  max-width: 72px; text-align: center;
}
.status-end {
  padding: 5px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.15em;
  cursor: pointer;
  border: 1px solid var(--cy-pink);
  background: rgba(255,42,109,0.1);
  color: var(--cy-pink);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.status-end:active { background: rgba(255,42,109,0.25); }
.sb-actions {
  display: flex; gap: 6px; justify-content: flex-end;
}
.next-hand {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 4px;
  padding: 8px 14px;
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--bg);
  background: var(--cy-cyan);
  border: none; cursor: pointer;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  box-shadow: 0 0 20px var(--cy-cyan);
  animation: hum 1.5s ease-in-out infinite;
}
.next-hand.secondary {
  background: var(--cy-purple);
  box-shadow: 0 0 16px var(--cy-purple);
  font-size: 12px;
  padding: 8px 12px;
}
.next-hand.showdown-btn {
  background: var(--cy-yellow);
  color: var(--bg);
  box-shadow: 0 0 16px rgba(255,216,74,0.5);
  font-size: 11px;
  padding: 8px 14px;
  letter-spacing: 0.15em;
  animation: none;
}
@keyframes hum {
  0%,100% { box-shadow: 0 0 20px var(--cy-cyan); }
  50% { box-shadow: 0 0 30px var(--cy-cyan), 0 0 50px rgba(0,245,255,0.4); }
}
.next-hand:active { transform: scale(0.96); }

/* ── BTN PLACER ───────────────────────────────────────────────────── */
.btn-placer {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 10px;
  overflow-x: auto; padding: 4px 2px;
}
.btn-placer::-webkit-scrollbar { display: none; }
.bp-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.2em;
  color: var(--cy-cyan); text-transform: uppercase;
  flex-shrink: 0; opacity: 0.8;
}
.bp-dot {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.04);
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 11px;
  cursor: pointer;
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.bp-dot.on {
  background: var(--cy-yellow); color: var(--bg);
  border-color: var(--cy-yellow);
  box-shadow: 0 0 10px var(--cy-yellow);
}
.bp-dot.muted {
  opacity: 0.3;
}

/* ── HAND CONTROLS (undo + reset hand, above player list) ──────────── */
.hand-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  padding: 0 2px;
}
.hc-toggles {
  display: flex;
  gap: 4px;
}
.hc-tog {
  padding: 5px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  cursor: pointer;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.04);
  color: var(--dim);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.hc-tog.on {
  background: var(--cy-yellow);
  color: var(--bg);
  border-color: var(--cy-yellow);
  text-shadow: none;
}
.hc-tog:disabled { opacity: 0.3; cursor: not-allowed; }
.hc-tog:active:not(:disabled) { background: rgba(0,245,255,0.12); }
.hc-actions {
  display: flex;
  gap: 4px;
}
.hc-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.04);
  color: var(--cy-cyan);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.hc-btn:active { background: rgba(0,245,255,0.12); }
.hc-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── PLAYER LIST ──────────────────────────────────────────────────── */
.player-list {
  display: flex; flex-direction: column;
  gap: 4px;
  margin-bottom: 16px;
}
.row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  background: var(--panel);
  border: 1px solid var(--line);
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  min-height: 36px;
  transition: border-color 150ms, background 150ms;
}
.row.hero {
  border-color: #ff8a3c !important;
  background: linear-gradient(90deg, rgba(255,138,60,0.1), var(--panel) 40%);
  box-shadow: inset 2px 0 0 0 #ff8a3c, 0 0 8px rgba(255,138,60,0.2);
}
.row.can-act {
  border-color: var(--cy-pink);
  box-shadow: inset 2px 0 0 0 var(--cy-pink);
}
.row.can-act.hero {
  border-color: #ff8a3c !important;
  box-shadow: inset 2px 0 0 0 #ff8a3c, 0 0 12px rgba(255,138,60,0.4);
}
.row.folded { opacity: 0.32; }
.row.open { opacity: 0.6; border-style: dashed; }

/* SEAT OPEN & BREAK */
.row.seat-open, .row.seat-break {
  opacity: 0.5;
  border-style: dashed;
  background: rgba(5,6,10,0.5);
}
.row.seat-open {
  border-color: #ff4d4d;
  opacity: 0.45;
}
.row.seat-break {
  border-color: var(--cy-yellow);
  opacity: 0.6;
}
.inactive-name {
  color: var(--dim) !important;
  font-style: italic;
  text-shadow: none !important;
}
.tag-seatopen {
  color: #ff4d4d !important;
  border-color: rgba(255,77,77,0.4) !important;
  background: rgba(255,77,77,0.1) !important;
  text-shadow: none !important;
}
.tag-break {
  color: var(--cy-yellow) !important;
  border-color: rgba(255,244,90,0.5) !important;
  background: rgba(255,244,90,0.1) !important;
}

/* SWAP MODE (tap to select, tap another to swap) */
.row.swap-from {
  border-color: var(--cy-cyan) !important;
  background: rgba(0,245,255,0.12) !important;
  box-shadow: 0 0 16px rgba(0,245,255,0.3);
}
.row.swap-target {
  cursor: pointer;
  border-color: var(--cy-pink) !important;
  border-style: dashed !important;
}
.row.swap-target:active {
  background: rgba(255,42,109,0.15) !important;
}
.swap-label {
  color: var(--cy-cyan) !important;
  font-size: 9px !important;
  font-weight: 700 !important;
  letter-spacing: 0.1em;
}
.swap-label-target {
  color: var(--cy-pink) !important;
  font-size: 9px !important;
  font-weight: 700 !important;
  letter-spacing: 0.1em;
  animation: pulse-pink 1s ease-in-out infinite;
}
@keyframes pulse-pink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.swap-hint {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-pink);
  letter-spacing: 0.1em;
  padding: 6px;
  animation: pulse-pink 1s ease-in-out infinite;
}

.row-menu-btn {
  width: 20px;
  height: 32px;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--line);
  color: var(--cy-cyan);
  font-weight: 700;
  font-size: 16px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  flex-shrink: 0;
}
.row-menu-btn:active { background: rgba(0,245,255,0.15); }

.row-left {
  display: flex; align-items: flex-start; gap: 6px;
  min-width: 0; flex: 1;
}
.row-info {
  display: flex; flex-direction: column;
  gap: 1px;
  min-width: 0; flex: 1;
  padding-top: 3px;
}
.row-tag-inline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em;
}
.tag-color-seatopen { color: #ff4d4d; }
.tag-color-break { color: var(--cy-yellow); }
.tag-color-post { color: var(--cy-pink); border: 1px solid var(--cy-pink); padding: 0 4px; }
.row-actions-history {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.action-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 0;
  line-height: 1.2;
}
/* action colors — no border, just colored text */
.action-fold { color: var(--dim); }
.action-limp, .action-call, .action-check { color: var(--cy-yellow); }
.action-open, .action-iso { color: var(--cy-purple); }
.action-3bet, .action-4bet, .action-5bet, .action-6bet, .action-sqz { color: var(--cy-pink); }
.action-win { color: #ffd84a; }
.row-pos {
  display: flex; align-items: center;
  justify-content: center;
  flex-shrink: 0;
  min-width: 32px;
  align-self: stretch;
  position: relative;
}
.pos-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--cy-cyan);
  text-transform: uppercase;
  font-weight: 800;
  line-height: 1;
  padding: 2px 3px;
  text-align: center;
  min-width: 28px;
  display: flex; align-items: center; justify-content: center;
  height: 100%;
  border-right: 1px solid currentColor;
  background: rgba(0,245,255,0.08);
}
.seat-id {
  position: absolute;
  bottom: -1px; left: calc(100% + 0px);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  opacity: 0.8;
  line-height: 0.7;
}
/* Position-specific colors */
.pos-bu, .pos-busb {
  color: #ffd84a;
  background: rgba(255,216,74,0.12);
  text-shadow: 0 0 6px rgba(255,216,74,0.4);
}
.pos-sb {
  color: #8fffb0;
  background: rgba(143,255,176,0.1);
}
.pos-bb {
  color: #ff8a3c;
  background: rgba(255,138,60,0.15);
  text-shadow: 0 0 5px rgba(255,138,60,0.4);
}
.pos-str {
  color: #ff5c8a;
  background: rgba(255,92,138,0.15);
  text-shadow: 0 0 5px rgba(255,92,138,0.4);
}
.pos-msp {
  color: #ff5c8a;
  background: rgba(255,92,138,0.15);
  text-shadow: 0 0 5px rgba(255,92,138,0.4);
}

.row-name {
  background: transparent; border: none;
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 600; font-size: 15px;
  color: var(--ink);
  text-align: left;
  padding: 0; margin: 0;
  cursor: pointer;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: 0.02em;
  min-width: 0;
}
.row-name.muted { color: var(--dim); font-style: italic; font-weight: 400; }
.row-name.edit {
  outline: none;
  color: var(--cy-pink);
  border-bottom: 1px solid var(--cy-pink);
  min-width: 100px;
}
.hero-name {
  color: #ff8a3c; font-weight: 700;
  text-shadow: 0 0 8px rgba(255,138,60,0.4);
}
.random-name {
  color: var(--dim);
  font-style: italic;
  font-weight: 500;
  font-size: 13px;
}

.row-last {
  margin-left: auto;
  padding: 2px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 9.5px;
  letter-spacing: 0.08em;
  line-height: 1.3;
  border: 1px solid currentColor;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  flex-shrink: 0;
}
.tag-fold { color: var(--dim); border-color: var(--faint); background: transparent; }
.tag-limp, .tag-call, .tag-check {
  color: var(--cy-yellow);
  background: rgba(255,244,90,0.12);
}
.tag-open, .tag-iso {
  color: var(--cy-purple);
  background: rgba(178,124,255,0.18);
}
.tag-3bet, .tag-4bet, .tag-5bet, .tag-6bet, .tag-sqz {
  color: var(--cy-pink);
  background: rgba(255,42,109,0.2);
  text-shadow: 0 0 4px rgba(255,42,109,0.4);
}
.tag-win {
  color: #ffd84a;
  background: rgba(255,216,74,0.2);
  text-shadow: 0 0 6px rgba(255,216,74,0.5);
  font-weight: 800;
}

.row-right {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── ACTION BUTTONS ───────────────────────────────────────────────── */
.act-row {
  display: flex;
  gap: 4px;
}
.act {
  padding: 7px 10px;
  min-width: 50px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.05em;
  border: 1px solid var(--line);
  background: rgba(5,6,10,0.92);
  color: var(--ink);
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  transition: transform 80ms, background 120ms;
  text-align: center;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
}
.act:active { transform: scale(0.92); }
.act.act-mute {
  color: var(--ink-soft);
  border-color: var(--faint);
  background: rgba(53,70,80,0.2);
}
.act.act-mute:active { background: rgba(53,70,80,0.5); }
.act.act-neutral {
  color: var(--cy-yellow);
  border-color: rgba(255,244,90,0.5);
  background: rgba(255,244,90,0.08);
}
.act.act-neutral:active { background: rgba(255,244,90,0.25); }
.act.act-accent {
  color: #fff;
  border-color: var(--cy-pink);
  background: rgba(255,42,109,0.18);
  box-shadow: 0 0 6px rgba(255,42,109,0.3);
}
.act.act-accent:active {
  background: var(--cy-pink);
  box-shadow: 0 0 12px var(--cy-pink);
}
.act.act-danger {
  color: #ff4d4d;
  border-color: #ff4d4d;
  background: rgba(255,77,77,0.12);
}
.act.act-danger:active { background: rgba(255,77,77,0.3); }
.act.act-warn {
  color: var(--cy-yellow);
  border-color: var(--cy-yellow);
  background: rgba(255,244,90,0.1);
}
.act.act-warn:active { background: rgba(255,244,90,0.25); }

.row-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
  padding: 0 8px;
}
.row-status.muted { opacity: 0.4; }

/* ── REORDER MODE ─────────────────────────────────────────────────── */
.reorder-ctrls { display: flex; gap: 3px; }
.rc-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.05);
  color: var(--cy-cyan);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 14px;
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  display: inline-flex; align-items: center; justify-content: center;
}
.rc-btn:active { background: rgba(0,245,255,0.2); }
.rc-btn.warn { color: var(--cy-pink); border-color: var(--line-hot); }

/* ── NAME MODAL ───────────────────────────────────────────────────── */
.name-modal {
  max-width: 440px;
  width: 100%;
}
.name-input {
  width: 100%;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--cy-cyan);
  color: var(--ink);
  padding: 12px 14px;
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 600;
  font-size: 17px;
  outline: none;
  letter-spacing: 0.02em;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.name-input:focus {
  border-color: var(--cy-pink);
  box-shadow: 0 0 10px rgba(255,42,109,0.4);
}
.name-input::placeholder {
  color: var(--dim);
  font-weight: 400;
  font-style: italic;
}
.name-actions {
  display: flex; gap: 6px;
  flex-wrap: wrap;
}
.name-btn {
  flex: 1;
  min-width: 140px;
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  border: none;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.name-btn.create {
  background: var(--cy-pink);
  color: #fff;
  box-shadow: 0 0 10px rgba(255,42,109,0.4);
}
.name-btn.create:active { background: #fff; color: var(--cy-pink); }
.name-btn.rename {
  background: var(--cy-yellow);
  color: var(--bg);
}
.name-btn.rename:active { background: #fff; }
.name-btn.rename-reset {
  background: transparent;
  color: var(--cy-pink);
  border: 1px solid var(--cy-pink);
}
.name-btn.rename-reset:active { background: rgba(255,42,109,0.15); }

.name-divider {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
}
.name-divider::before, .name-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}
.name-divider span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-cyan);
  letter-spacing: 0.2em;
  opacity: 0.7;
}

.name-list {
  display: flex; flex-direction: column;
  gap: 2px;
  max-height: 260px;
  overflow-y: auto;
  border: 1px solid var(--line);
  background: rgba(0,0,0,0.3);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.name-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(0,245,255,0.08);
  color: var(--ink);
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  width: 100%;
}
.name-item:active { background: rgba(0,245,255,0.12); }
.name-item:last-child { border-bottom: none; }
.name-item-seated {
  opacity: 0.3;
  cursor: not-allowed;
  pointer-events: none;
}
.ni-name { font-weight: 600; }
.ni-seated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  color: var(--cy-yellow);
  letter-spacing: 0.1em;
  padding: 1px 4px;
  border: 1px solid rgba(255,216,74,0.3);
}
.ni-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.12em;
}
.name-empty {
  padding: 20px;
  text-align: center;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  font-style: italic;
}

/* ── STATS TABLE ──────────────────────────────────────────────────── */
.stats { margin-top: 16px; }
.stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; padding: 0 4px;
}
.stats-head h2 {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.2em; margin: 0;
  color: var(--cy-cyan);
  text-shadow: 0 0 6px rgba(0,245,255,0.3);
}
.stats-toggle {
  display: flex; gap: 0;
  border: 1px solid var(--line);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.tog {
  padding: 4px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.15em;
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
}
.tog.on {
  background: var(--cy-cyan);
  color: var(--bg);
}
.stats-scroll {
  border: 1px solid var(--line);
  overflow-x: auto;
  background: rgba(0,245,255,0.02);
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}
.stats-grid {
  display: grid;
  min-width: 100%;
}
.sh, .sc {
  padding: 5px 4px;
  border-bottom: 1px solid rgba(0,245,255,0.08);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
}
.sh {
  background: rgba(0,245,255,0.07);
  color: var(--cy-cyan);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 8px; font-weight: 700;
  border-bottom: 1px solid var(--cy-cyan);
  text-align: center;
  white-space: nowrap;
}
.sh:first-child { text-align: left; }
.sc {
  display: flex; flex-direction: column; gap: 1px;
  align-items: center; justify-content: center;
}
.sc.name {
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 600; font-size: 11px;
  align-items: flex-start; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sc.hero-row {
  color: var(--cy-cyan); font-weight: 700;
  text-shadow: 0 0 6px rgba(0,245,255,0.4);
}
.sc.random-row {
  color: var(--dim);
  font-style: italic;
  font-weight: 500;
}
.sc.dim { color: var(--dim); }
.sc.mono { font-family: 'JetBrains Mono', monospace; }
.sc-val { font-size: 12px; font-weight: 700; line-height: 1; }
.sc-frac { color: var(--dim); font-size: 7px; line-height: 1; opacity: 0.7; }

/* Stat cell clickable */
.sc-clickable {
  cursor: pointer;
}
.sc-clickable:active { background: rgba(0,245,255,0.1); }
.sc-active {
  background: rgba(255,42,109,0.12) !important;
  border: 1px solid var(--cy-pink);
}

/* Drill row (inline position breakdown) */
.drill-row {
  background: rgba(0,245,255,0.03);
  border-top: 1px solid var(--cy-pink);
  border-bottom: 1px solid var(--cy-pink);
  padding: 8px;
}
.drill-row-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--cy-cyan);
  letter-spacing: 0.1em;
}
.drill-close {
  background: transparent; border: none;
  color: var(--dim); cursor: pointer;
}
.drill-row-cols {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.drill-na {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
  font-style: italic;
}
.drill-col {
  display: flex; flex-direction: column; align-items: center;
  min-width: 36px;
  padding: 4px 5px;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--faint);
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}
.drill-col-pos {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; font-weight: 700;
  color: var(--cy-cyan);
  letter-spacing: 0.08em;
}
.drill-col-val {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px; font-weight: 700;
  line-height: 1.1;
}
.drill-col-frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; color: var(--dim);
  opacity: 0.6;
}
.drill-col-sd { cursor: pointer; }
.drill-col-sd:active { background: rgba(255,216,74,0.15); }
.drill-sd-badge {
  font-size: 8px;
  color: var(--cy-yellow);
  margin-top: 1px;
}
.drill-sd-list {
  display: flex; flex-direction: column; gap: 2px;
  margin-top: 3px;
  padding-top: 3px;
  border-top: 1px solid var(--faint);
}
.drill-sd-hand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--cy-yellow);
  letter-spacing: 0.05em;
}

.stats-footer {
  display: flex; gap: 12px; justify-content: flex-end;
  margin-top: 6px; padding: 0 4px;
}
.reset-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--faint);
}
.reset-link.danger { color: var(--cy-pink); text-decoration-color: var(--line-hot); }

/* ── MODALS ───────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(5,6,10,0.85);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 16px;
  overscroll-behavior: contain;
  overflow: hidden;
  touch-action: none;
}
.modal {
  background: var(--bg-2);
  border: 1px solid var(--cy-cyan);
  box-shadow: 0 0 30px rgba(0,245,255,0.4);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  display: flex; flex-direction: column;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; letter-spacing: 0.2em;
  color: var(--cy-cyan);
}
.modal-close {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  cursor: pointer;
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
}
.modal-body {
  padding: 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.modal-foot {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 12px 16px;
  border-top: 1px solid var(--line);
}
.opt-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px;
  color: var(--ink);
}
.opt-row input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--cy-cyan);
}
.opt-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.05em;
  margin: 4px 0 0;
}
.sd-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--line);
}
.sd-row.sd-active {
  border-color: var(--cy-cyan);
  background: rgba(0,245,255,0.05);
}
.sd-name {
  display: flex; flex-direction: column; gap: 2px;
  flex-shrink: 0;
  width: 90px;
}
.sd-pos {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-cyan);
  letter-spacing: 0.1em;
}
.sd-name span:last-child {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 13px;
  font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sd-cards {
  display: flex; align-items: center; gap: 6px; flex: 1;
}
.sd-card-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700;
  background: rgba(0,245,255,0.1);
  border: 1px solid var(--line);
  padding: 4px 6px;
  cursor: pointer;
}
.sd-card-badge:active { opacity: 0.5; }
.sd-pick-btn {
  width: 28px; height: 28px;
  background: rgba(0,245,255,0.08);
  border: 1px dashed var(--cy-cyan);
  color: var(--cy-cyan);
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.sd-pick-btn:active { background: rgba(0,245,255,0.2); }

/* Card picker grid */
.card-picker {
  margin-top: 12px;
  display: flex; flex-direction: column; gap: 3px;
  padding: 8px;
  background: rgba(5,6,10,0.8);
  border: 1px solid var(--line);
}
.cp-suit-row {
  display: flex; gap: 2px; justify-content: center;
}
.cp-card {
  width: 26px; height: 34px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(20,25,40,0.9);
  border: 1px solid var(--faint);
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  padding: 0;
  gap: 0;
}
.cp-card:active { background: rgba(0,245,255,0.15); }
.cp-rank { font-size: 10px; font-weight: 700; line-height: 1; }
.cp-suit { font-size: 10px; line-height: 1; }
.cp-card.selected {
  background: rgba(0,245,255,0.25);
  border-color: var(--cy-cyan);
  box-shadow: 0 0 8px rgba(0,245,255,0.4);
}
.cp-card.used {
  opacity: 0.15;
  cursor: not-allowed;
}
.modal-wide { max-width: 420px; }
.modal-back {
  background: transparent; border: none;
  color: var(--cy-cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  cursor: pointer; padding: 4px 8px;
  letter-spacing: 0.1em;
}
.modal-back:active { color: var(--ink); }

/* Session History */
.sh-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.sh-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  color: var(--cy-cyan);
  min-width: 32px;
}
.sh-details {
  display: flex; flex-direction: column; gap: 2px; flex: 1;
}
.sh-room {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 12px; font-weight: 600; color: var(--ink);
}
.sh-blind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--dim);
}
.sh-meta {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
}
.sh-date { color: var(--faint); }

/* Player Observer */
.po-player-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 4px;
  background: transparent; border: none;
  border-bottom: 1px solid var(--line);
  cursor: pointer; text-align: left;
  color: var(--ink);
}
.po-player-btn:active { background: rgba(0,245,255,0.05); }
.po-name {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px; font-weight: 600;
  flex: 1;
}
.po-room {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
}
.po-hands {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--cy-cyan);
}
.po-toggle {
  display: flex; gap: 4px; margin-bottom: 10px;
}
.po-meta {
  display: flex; gap: 16px; margin-bottom: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--dim);
}
.po-stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.po-stat {
  display: flex; flex-direction: column;
  padding: 6px 8px;
  background: rgba(0,245,255,0.04);
  border: 1px solid var(--line);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.po-stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 700;
  color: var(--cy-cyan);
  letter-spacing: 0.15em;
  opacity: 0.7;
}
.po-stat-val {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 18px; font-weight: 700;
  line-height: 1.1;
}
.po-stat-frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; color: var(--dim);
  opacity: 0.6;
}

/* ── SETTINGS ────────────────────────────────────────────────────── */
.settings-section {
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.settings-section:last-child { border-bottom: none; margin-bottom: 0; }
.ss-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--cy-cyan);
  display: block; margin-bottom: 8px;
}
.ss-chips {
  display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px;
}
.ss-chip {
  padding: 5px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.04);
  color: var(--dim);
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.ss-chip.on {
  background: var(--cy-cyan);
  color: var(--bg);
  border-color: var(--cy-cyan);
}
.ss-chip:active { opacity: 0.7; }
.ss-add-row {
  display: flex; gap: 4px;
}
.ss-input {
  flex: 1;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 5px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
}
.ss-input:focus { border-color: var(--cy-cyan); }
.ss-input-sm { max-width: 100px; }
.ss-add-btn {
  padding: 5px 8px;
  background: rgba(0,245,255,0.08);
  border: 1px solid var(--line);
  color: var(--cy-cyan);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.ss-add-btn:active { background: rgba(0,245,255,0.2); }
.ss-select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 6px;
  outline: none;
}
.ss-player-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 200px; overflow-y: auto;
}
.ss-player-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid var(--faint);
}
.ss-pname {
  flex: 1;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ss-proom {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.1em;
}
.ss-edit-btn, .ss-del-btn {
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
  padding: 3px 4px;
  font-size: 12px;
}
.ss-edit-btn:active, .ss-del-btn:active { color: var(--cy-cyan); }
.ss-del-btn { color: var(--cy-pink); }
.ss-del-btn:active { color: #ff6090; }
`;

root.render(React.createElement(App));
