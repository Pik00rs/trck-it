<script>
const { useState, useEffect, useMemo, useRef } = React;
const { Trash2, Undo2, ChevronRight, Settings, X, Plus, RotateCcw, ArrowUpDown, RefreshCw } = window.lucideReact;

/* ============================================================================
   TRCK.iT. — preflop tracker (cyberpunk minimaliste)
   ============================================================================
   Sections:
   1. CONSTANTS
   2. STORAGE (localStorage helpers)
   3. STATS HELPERS
   4. POSITIONS / ORDER
   5. HAND STATE / DECISION TREE / APPLY ACTION
   6. ROOT APP COMPONENT
   7. SUB-COMPONENTS (PlayerRow, NameModal, Modals, StatsTable)
   8. STYLES
   ============================================================================ */

/* =============================================================================
   1. CONSTANTS
   ========================================================================== */

// New position scheme: BU / CO / HJ / MP / U2 / U1 / U0 / U-1 ... + SB + BB
// We start from BU and walk backward for HJ, CO, MP, U2, U1, U0, U-1...
// SB and BB always come right after BU.
function buildPositions(activeCount) {
  // activeCount = number of seated, non-empty players
  // Returns ordered list of position labels for activeCount players,
  // listing from BU forward: [BU, SB, BB, then back to UTG-most through CO]
  // Easier: define the full sorted-from-BU-backward list (most "advanced" position first)
  if (activeCount === 2) return ["BU/SB", "BB"];
  if (activeCount === 3) return ["BU", "SB", "BB"];
  // For >= 4: positions in order UTG-most → BU + SB + BB
  // We use the user-specified labels:
  //   BU CO HJ MP U2 U1 U0 U-1
  // Going backward from BU:
  const backward = ["BU", "CO", "HJ", "MP", "U2", "U1", "U0", "U-1"];
  // Need (activeCount - 2) positions for the "in front of BU" group (excludes SB/BB)
  const beforeBlinds = activeCount - 2;
  const slice = backward.slice(0, beforeBlinds).reverse(); // UTG-most first → ...CO BU
  return [...slice, "SB", "BB"]; // canonical preflop order: UTG-most → BB
}

const ACTION_LABELS = {
  fold: "FOLD",
  limp: "LIMP",
  call: "CALL",
  check: "CHECK",
  open: "RFI",
  iso: "ISO",
  "3bet": "3-BET",
  "4bet": "4-BET",
  "5bet": "5-BET",
  "6bet": "6-BET+",
  sqz: "SQZ",
  win: "WIN",
};

const STORAGE_KEYS = {
  players: "rangelive.players",
  seats: "rangelive.seats",
  btnSeatIdx: "rangelive.btn",
  tableSize: "rangelive.tableSize",
  options: "rangelive.options",
  history: "rangelive.history",
  randomPlayers: "rangelive.random",
  session: "rangelive.session",
  rooms: "rangelive.rooms",
  blinds: "rangelive.blinds",
  sessionHistory: "rangelive.sessionHistory",
};

const DEFAULT_ROOMS = ["Casino A", "Casino B", "Home Game"];
const DEFAULT_BLINDS = ["1/2", "1/3", "2/5", "5/10", "10/20", "25/50"];

/* =============================================================================
   2. STORAGE
   ========================================================================== */

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

/* =============================================================================
   3. STATS HELPERS
   ========================================================================== */

// Normalize player name: uppercase, remove accents
function normalizeName(name) {
  return name.trim()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .toUpperCase();
}

// All stat keys: each is { opp: count, act: count }
const STAT_KEYS = [
  "vpip", "pfr",
  "limp", "limpFold", "limpCall", "limpRaise",
  "rfi", "rfiFold", "rfiCall", "rfi4b",
  "flat", "threeBet",
  "threeBetFold", "threeBetCall", "threeBet5b",
  "flatMw", "sqz",
  "sqzFold", "sqzCall", "sqz5b",
  "coldCall", "cold4b",
  "postCheck", "postXFold", "postXCall", "postXRaise",
];

const emptyStats = () => {
  const s = { hands: 0, byPos: {} };
  STAT_KEYS.forEach((k) => { s[k] = { opp: 0, act: 0 }; });
  return s;
};

// Display labels for stats
const STAT_LABELS = {
  vpip: "VPIP", pfr: "PFR",
  limp: "LIMP", limpFold: "LIMP→F", limpCall: "LIMP→C", limpRaise: "LIMP→R",
  rfi: "RFI", rfiFold: "RFI→F", rfiCall: "RFI→C", rfi4b: "RFI→4B",
  flat: "FLAT", threeBet: "3B",
  threeBetFold: "3B→F", threeBetCall: "3B→C", threeBet5b: "3B→5B",
  flatMw: "FLAT MW", sqz: "SQZ",
  sqzFold: "SQZ→F", sqzCall: "SQZ→C", sqz5b: "SQZ→5B",
  coldCall: "CC 3B", cold4b: "C4B",
  postCheck: "POST✓", postXFold: "POST XF", postXCall: "POST XC", postXRaise: "POST XR",
};

const pct = (o, a) => (o === 0 ? null : Math.round((a / o) * 100));
const fmt = (v) => (v === null ? "—" : `${v}`);

// Normalize player name: uppercase, strip accents
function normalizeName(name) {
  return name.trim()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .toUpperCase();
}

const statColor = (value, kind) => {
  if (value === null) return "var(--dim)";
  // Tight / standard / loose / maniac thresholds
  const ranges = {
    vpip: [18, 28, 40], pfr: [12, 22, 30],
    limp: [5, 15, 25], rfi: [12, 22, 30],
    flat: [8, 16, 25], threeBet: [4, 8, 12], sqz: [3, 7, 12],
    flatMw: [8, 16, 25],
  };
  const r = ranges[kind] || [20, 40, 60];
  if (value < r[0]) return "var(--cy-cyan)";
  if (value < r[1]) return "var(--cy-green)";
  if (value < r[2]) return "var(--cy-yellow)";
  return "var(--cy-pink)";
};

function mergeStats(a, b) {
  const out = emptyStats();
  out.hands = (a.hands || 0) + (b.hands || 0);
  STAT_KEYS.forEach((k) => {
    const ak = a[k] || { opp: 0, act: 0 };
    const bk = b[k] || { opp: 0, act: 0 };
    out[k] = { opp: ak.opp + bk.opp, act: ak.act + bk.act };
  });
  // Merge byPos
  const aPos = a.byPos || {};
  const bPos = b.byPos || {};
  const allPositions = new Set([...Object.keys(aPos), ...Object.keys(bPos)]);
  allPositions.forEach((pos) => {
    const ap = aPos[pos] || { hands: 0 };
    const bp = bPos[pos] || { hands: 0 };
    const merged = { hands: (ap.hands || 0) + (bp.hands || 0) };
    STAT_KEYS.forEach((k) => {
      const apk = ap[k] || { opp: 0, act: 0 };
      const bpk = bp[k] || { opp: 0, act: 0 };
      merged[k] = { opp: apk.opp + bpk.opp, act: bpk.act + apk.act };
    });
    merged.showdowns = [...(ap.showdowns || []), ...(bp.showdowns || [])];
    out.byPos[pos] = merged;
  });
  return out;
}

/* =============================================================================
   4. POSITIONS / ACTION ORDER
   ========================================================================== */

/**
 * Given the seats array and BTN index, compute:
 *  - position label for each seat (or null if seat is empty)
 *  - the action order (array of seat indexes, starting with first to act preflop)
 *
 * Rules:
 *  - Empty seats are skipped (positions recalculated).
 *  - BU always sits at btnSeatIdx (or, if that seat is empty, the next non-empty
 *    seat clockwise becomes the BU).
 *  - Heads-up: BU/SB then BB.
 *  - 3-handed: BU, SB, BB.
 *  - 4+: UTG-most ... CO, BU, SB, BB. With straddle, BTN+3 is the straddler
 *    and acts last preflop with the option to raise.
 */
function computeLayout(seats, btnSeatIdx, options) {
  const n = seats.length;
  // Find the actual BU seat (first playable starting at btnSeatIdx)
  let buSeat = -1;
  for (let i = 0; i < n; i++) {
    const idx = (btnSeatIdx + i) % n;
    if (isSeatPlayable(seats[idx]) && seats[idx].playerId !== null) { buSeat = idx; break; }
  }
  if (buSeat === -1) return { positions: seats.map(() => null), order: [], buSeat: -1 };

  // Active seats clockwise starting from BU (playable only)
  const active = [];
  for (let i = 0; i < n; i++) {
    const idx = (buSeat + i) % n;
    if (isSeatPlayable(seats[idx]) && seats[idx].playerId !== null) active.push(idx);
  }
  const activeCount = active.length;

  // Position labels (from BU forward)
  // active[0] = BU, active[1] = SB, active[2] = BB, active[3] = UTG-most...
  const posLabels = buildPositions(activeCount);
  // posLabels is in canonical preflop order: UTG-most first ... BB last
  // Map: active[k] for k = activeCount - 1 down to 3 maps to positions UTG-most→CO
  // We need to assign labels to active[]: active[0]=BU, active[1]=SB, active[2]=BB,
  // active[3..activeCount-1] = CO, HJ, MP, U2, U1, U0, U-1 (going backward in clockwise)
  // Equivalently: active[k] for k>=1 corresponds to positions[(activeCount - k) % activeCount? Not quite].
  // Let's just walk the canonical order and match.

  // canonical preflop order: UTG-most ... CO, BU, SB, BB
  // canonical[0..activeCount-3] = positions in front of BU (UTG-most → CO)
  // canonical[activeCount-3] = BU, canonical[activeCount-2] = SB, canonical[activeCount-1] = BB
  // For 2P: canonical = [BU/SB, BB]
  // For 3P: canonical = [BU, SB, BB]
  // For 4P: canonical = [CO, BU, SB, BB]
  // ...
  // active = [BU, SB, BB, UTG-most-furthest-from-BU, ..., CO (closest to BU)]
  // The seat at active[3 + j] for j=0..activeCount-4 corresponds to canonical[activeCount-4-j]
  // (i.e., active[3]=UTG-most=canonical[0], active[4]=canonical[1], ..., active[activeCount-1]=CO=canonical[activeCount-4])

  const positions = new Array(n).fill(null);
  if (activeCount === 2) {
    positions[active[0]] = "BU/SB";
    positions[active[1]] = "BB";
  } else if (activeCount === 3) {
    positions[active[0]] = "BU";
    positions[active[1]] = "SB";
    positions[active[2]] = "BB";
  } else {
    positions[active[0]] = "BU";
    positions[active[1]] = "SB";
    positions[active[2]] = "BB";
    // active[3..activeCount-1] = UTG-most, then closer to BU as index grows
    for (let k = 3; k < activeCount; k++) {
      const canonicalIdx = activeCount - 1 - k + (activeCount - 3); // = 2*activeCount - 4 - k
      // Simpler: position labels in front of BU, going clockwise away from BU:
      // active[3] = UTG-most, active[4] = next-utg, ..., active[activeCount-1] = CO
      // Labels going from UTG-most to CO are: posLabels[0] ... posLabels[activeCount-4]
      // But active[3] = UTG-most = posLabels[0], active[4] = posLabels[1], ...
      positions[active[k]] = posLabels[k - 3];
    }
  }

  // Action order: preflop = first to act after BB, going clockwise, ending with BB
  // Preflop action order: UTG-most → ... → CO → BU → SB → BB
  // active[0]=BU, active[1]=SB, active[2]=BB, active[3..]=UTG-most→CO
  // So order is: active[3], active[4], ..., active[activeCount-1] (CO), active[0] (BU), active[1] (SB), active[2] (BB)
  let order;
  if (activeCount === 2) order = [active[0], active[1]];
  else if (activeCount === 3) order = [active[0], active[1], active[2]];
  else {
    order = [];
    for (let k = 3; k < activeCount; k++) order.push(active[k]);
    order.push(active[0]); // BU
    order.push(active[1]); // SB
    order.push(active[2]); // BB
  }

  // STRADDLE: straddler sits at position active[3] (UTG) → acts after BB preflop
  // Mississippi = straddle from BU (active[0])
  if (options.straddle && activeCount >= 4) {
    if (!options.mississippi) {
      // UTG straddles. New action order: UTG+1, ..., CO, BU, SB, BB, STR(UTG)
      const utgSeat = active[3];
      positions[utgSeat] = "STR";
      order = order.filter((s) => s !== utgSeat);
      order.push(utgSeat);
    } else {
      // Mississippi: BU straddles. Action: SB, BB, UTG, ..., CO, MSP(BU)
      const buSeatIdx = active[0];
      positions[buSeatIdx] = "MSP";
      // Rebuild order: SB first, BB second, then UTG..CO, then MSP(BU) last
      order = [
        active[1], // SB
        active[2], // BB
      ];
      for (let k = 3; k < activeCount; k++) order.push(active[k]); // UTG..CO
      order.push(buSeatIdx); // MSP last
    }
  }

  return { positions, order, buSeat, activeCount };
}

/* =============================================================================
   5. HAND STATE / DECISION TREE / APPLY ACTION
   ========================================================================== */

function buildInitialHand(seats, layout, options) {
  const inHandSeats = new Set(layout.order);
  // Pre-compute that the initial state has limpers from straddle (treated as a forced bet, not a limp)
  // We keep raiseCount = 0 (straddle is just a bigger BB for our preflop logic).
  return {
    seats: seats.map((s) => s ? { ...s } : null),
    order: layout.order,
    positions: layout.positions,
    buSeat: layout.buSeat,
    inHand: inHandSeats,
    raiseCount: 0,
    lastRaiserSeat: null,
    callersSinceLastRaise: 0,
    limpers: 0,
    events: [],
    actedSinceLastRaise: new Set(),
    closed: false,
    showdownOpen: false,
    showdownData: {},
    posts: new Set(), // seatIdx of players who posted (missed BB, paid to return)
    playerEvents: seats.map((s) => {
      if (!s) return null;
      const opp = {}; const act = {};
      STAT_KEYS.forEach((k) => { opp[k] = false; act[k] = false; });
      return { dealt: true, opp, act, postChecked: false };
    }),
    options,
  };
}

function getRemainingQueue(h) {
  const order = h.order;
  if (h.raiseCount === 0) {
    return order.filter((s) => h.inHand.has(s) && !h.actedSinceLastRaise.has(s));
  }
  // After a raise, queue starts after the lastRaiser in the order, wraps around
  const raiserPos = order.indexOf(h.lastRaiserSeat);
  if (raiserPos === -1) return [];
  const queue = [];
  for (let step = 1; step < order.length; step++) {
    const s = order[(raiserPos + step) % order.length];
    if (h.inHand.has(s) && !h.actedSinceLastRaise.has(s)) queue.push(s);
  }
  return queue;
}

function isActionClosed(h) {
  const stillIn = [...h.inHand];
  if (stillIn.length <= 1) return true;
  if (h.raiseCount === 0) {
    for (const s of stillIn) {
      if (!h.actedSinceLastRaise.has(s)) return false;
    }
    return true;
  }
  for (const s of stillIn) {
    if (s === h.lastRaiserSeat) continue;
    if (!h.actedSinceLastRaise.has(s)) return false;
  }
  return true;
}

function getSituationFor(h, seatIdx) {
  if (!h.inHand.has(seatIdx)) return null;

  const isPosted = h.posts && h.posts.has(seatIdx);
  const ev = h.playerEvents[seatIdx];
  const postHasChecked = ev && ev.postChecked;

  // ── POSTED player (not yet checked) — only relevant BEFORE they've acted ──
  if (isPosted && !postHasChecked) {
    const raises = h.raiseCount;
    // No action before: can CHECK (post is a forced bet, they already paid) or RAISE (RFI)
    if (raises === 0) {
      return {
        actions: [
          { type: "check", label: "CHECK", tone: "neutral" },
          { type: "open", label: "RFI", tone: "accent" },
        ],
      };
    }
    // 1 raise: FOLD / CALL / 3B (treated as normal raise)
    if (raises === 1 && h.callersSinceLastRaise === 0) {
      return {
        actions: [
          { type: "fold", label: "FOLD", tone: "mute" },
          { type: "call", label: "CALL", tone: "neutral" },
          { type: "3bet", label: "3-BET", tone: "accent" },
        ],
      };
    }
    if (raises === 1 && h.callersSinceLastRaise >= 1) {
      return {
        actions: [
          { type: "fold", label: "FOLD", tone: "mute" },
          { type: "call", label: "CALL", tone: "neutral" },
          { type: "sqz", label: "SQZ", tone: "accent" },
        ],
      };
    }
    // 2+ raises: FOLD / CALL / 4B
    if (raises === 2) {
      return {
        actions: [
          { type: "fold", label: "FOLD", tone: "mute" },
          { type: "call", label: "CALL", tone: "neutral" },
          { type: "4bet", label: "4-BET", tone: "accent" },
        ],
      };
    }
  }

  // ── POSTED player who has CHECKED, now facing iso ──
  if (isPosted && postHasChecked) {
    const raises = h.raiseCount;
    if (raises === 1 && h.callersSinceLastRaise === 0) {
      return {
        actions: [
          { type: "postXFold", label: "FOLD", tone: "mute" },
          { type: "postXCall", label: "CALL", tone: "neutral" },
          { type: "postXRaise", label: "3-BET", tone: "accent" },
        ],
      };
    }
    if (raises === 1 && h.callersSinceLastRaise >= 1) {
      return {
        actions: [
          { type: "postXFold", label: "FOLD", tone: "mute" },
          { type: "postXCall", label: "CALL", tone: "neutral" },
          { type: "postXRaise", label: "SQZ", tone: "accent" },
        ],
      };
    }
  }

  // Detect if this is the "big blind" or straddler (last to act preflop = last in order)
  const isLastToAct = seatIdx === h.order[h.order.length - 1];
  const raises = h.raiseCount;
  const callers = h.callersSinceLastRaise;

  // ── LAST TO ACT (BB or straddler) special cases ──
  if (isLastToAct) {
    // Nobody did anything before → everyone folded to BB/straddler → WIN
    if (raises === 0 && h.limpers === 0) {
      return {
        actions: [
          { type: "win", label: "WIN", tone: "accent" },
        ],
      };
    }
    // Limps only → can CHECK or ISO (raise)
    if (raises === 0 && h.limpers > 0) {
      return {
        actions: [
          { type: "check", label: "CHECK", tone: "neutral" },
          { type: "iso", label: "ISO", tone: "accent" },
        ],
      };
    }
    // 1 raise, no caller → FOLD / CALL / 3B
    if (raises === 1 && callers === 0) {
      return {
        actions: [
          { type: "fold", label: "FOLD", tone: "mute" },
          { type: "call", label: "CALL", tone: "neutral" },
          { type: "3bet", label: "3-BET", tone: "accent" },
        ],
      };
    }
    // 1 raise + caller(s) → FOLD / CALL / SQZ
    if (raises === 1 && callers >= 1) {
      return {
        actions: [
          { type: "fold", label: "FOLD", tone: "mute" },
          { type: "call", label: "CALL", tone: "neutral" },
          { type: "sqz", label: "SQZ", tone: "accent" },
        ],
      };
    }
    // falls through to generic raise handling below
  }

  // ── GENERIC (non-BB or BB facing 2+ raises) ──
  if (raises === 0 && h.limpers === 0) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "LIMP", tone: "neutral" },
        { type: "open", label: "RFI", tone: "accent" },
      ],
    };
  }
  if (raises === 0 && h.limpers > 0) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "LIMP", tone: "neutral" },
        { type: "iso", label: "ISO", tone: "accent" },
      ],
    };
  }
  if (raises === 1 && callers === 0) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "CALL", tone: "neutral" },
        { type: "3bet", label: "3-BET", tone: "accent" },
      ],
    };
  }
  if (raises === 1 && callers >= 1) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "CALL", tone: "neutral" },
        { type: "sqz", label: "SQZ", tone: "accent" },
      ],
    };
  }
  if (raises === 2) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "CALL", tone: "neutral" },
        { type: "4bet", label: "4-BET", tone: "accent" },
      ],
    };
  }
  if (raises === 3) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "CALL", tone: "neutral" },
        { type: "5bet", label: "5-BET", tone: "accent" },
      ],
    };
  }
  if (raises === 4) {
    return {
      actions: [
        { type: "fold", label: "FOLD", tone: "mute" },
        { type: "call", label: "CALL", tone: "neutral" },
        { type: "6bet", label: "6-BET+", tone: "accent" },
      ],
    };
  }
  return {
    actions: [
      { type: "fold", label: "FOLD", tone: "mute" },
      { type: "call", label: "CALL", tone: "neutral" },
      { type: "6bet", label: "JAM", tone: "accent" },
    ],
  };
}

function applyAction(h, seatIdx, type) {
  const next = {
    ...h,
    inHand: new Set(h.inHand),
    actedSinceLastRaise: new Set(h.actedSinceLastRaise),
    events: [...h.events],
    playerEvents: h.playerEvents.map((e) => e ? {
      dealt: e.dealt,
      opp: { ...e.opp },
      act: { ...e.act },
    } : null),
  };

  const queue = getRemainingQueue(h);
  const targetPos = queue.indexOf(seatIdx);
  if (targetPos === -1) return h;

  // Helper: set opportunities for a player based on the current hand state
  const setOpp = (ev, state) => {
    ev.opp.vpip = true;
    ev.opp.pfr = true;
    if (state.raiseCount === 0) {
      // Open spot: can limp or RFI (or ISO if limps, but ISO = RFI)
      ev.opp.limp = true;
      ev.opp.rfi = true;
    }
    if (state.raiseCount === 1 && state.callersSinceLastRaise === 0) {
      ev.opp.flat = true;
      ev.opp.threeBet = true;
    }
    if (state.raiseCount === 1 && state.callersSinceLastRaise >= 1) {
      ev.opp.flatMw = true;
      ev.opp.sqz = true;
    }
    // Cold call / cold 4b: facing a 3bet+ without having acted before
    if (state.raiseCount >= 2) {
      const hasActedBefore = ev.act.limp || ev.act.rfi || ev.act.flat || ev.act.flatMw
        || ev.act.threeBet || ev.act.sqz;
      if (!hasActedBefore) {
        ev.opp.coldCall = true;
        ev.opp.cold4b = true;
      }
    }
  };

  // Auto-fold every player BEFORE target in queue
  for (let i = 0; i < targetPos; i++) {
    const s = queue[i];
    const ev = next.playerEvents[s];
    if (!ev) continue;
    setOpp(ev, h);
    next.events.push({ who: s, kind: "fold" });
    next.inHand.delete(s);
    next.actedSinceLastRaise.add(s);
  }

  const ev = next.playerEvents[seatIdx];

  // SPECIAL: "win" = BB/straddler wins without action
  if (type === "win") {
    next.events.push({ who: seatIdx, kind: "win" });
    next.actedSinceLastRaise.add(seatIdx);
    next.closed = true;
    return next;
  }

  // Set opportunities for the acting player
  setOpp(ev, h);

  switch (type) {
    case "fold":
      next.events.push({ who: seatIdx, kind: "fold" });
      next.inHand.delete(seatIdx);
      next.actedSinceLastRaise.add(seatIdx);
      _resolvePhase2Fold(ev, h);
      break;
    case "check":
      next.events.push({ who: seatIdx, kind: "check" });
      next.actedSinceLastRaise.add(seatIdx);
      // If posted and checking, mark postCheck stat and postChecked flag
      if (next.posts && next.posts.has(seatIdx)) {
        ev.opp.postCheck = true;
        ev.act.postCheck = true;
        ev.postChecked = true;
      }
      break;
    case "postXFold":
      next.events.push({ who: seatIdx, kind: "fold" });
      ev.opp.postXFold = true;
      ev.act.postXFold = true;
      next.inHand.delete(seatIdx);
      next.actedSinceLastRaise.add(seatIdx);
      break;
    case "postXCall":
      next.events.push({ who: seatIdx, kind: "call" });
      ev.opp.postXCall = true;
      ev.act.postXCall = true;
      ev.act.vpip = true;
      next.actedSinceLastRaise.add(seatIdx);
      next.callersSinceLastRaise += 1;
      break;
    case "postXRaise":
      next.events.push({ who: seatIdx, kind: h.callersSinceLastRaise === 0 ? "3bet" : "sqz" });
      ev.opp.postXRaise = true;
      ev.act.postXRaise = true;
      ev.act.vpip = true; ev.act.pfr = true;
      next.raiseCount = 2;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      break;
    case "call": {
      const isLimp = h.raiseCount === 0;
      next.events.push({ who: seatIdx, kind: isLimp ? "limp" : "call" });
      ev.act.vpip = true;
      if (isLimp) {
        ev.act.limp = true;
        next.limpers += 1;
      } else {
        if (!_resolvePhase2Call(ev, h)) {
          // Check cold call FIRST (before setting flat/flatMw)
          if (h.raiseCount >= 2) {
            const hadAction = ev.act.limp || ev.act.rfi || ev.act.flat || ev.act.flatMw
              || ev.act.threeBet || ev.act.sqz;
            if (!hadAction) ev.act.coldCall = true;
          }
          // Flat = call a single raise (raiseCount === 1)
          if (h.raiseCount === 1) {
            if (h.callersSinceLastRaise === 0) ev.act.flat = true;
            else ev.act.flatMw = true;
          }
        }
        next.callersSinceLastRaise += 1;
      }
      next.actedSinceLastRaise.add(seatIdx);
      break;
    }
    case "open":
      next.events.push({ who: seatIdx, kind: "open" });
      ev.act.vpip = true; ev.act.pfr = true; ev.act.rfi = true;
      next.raiseCount = 1;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      break;
    case "iso":
      next.events.push({ who: seatIdx, kind: "iso" });
      ev.act.vpip = true; ev.act.pfr = true; ev.act.rfi = true;
      // If this player limped earlier, it's limpRaise
      if (ev.act.limp) { ev.opp.limpRaise = true; ev.act.limpRaise = true; }
      next.raiseCount = 1;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.limpers = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      break;
    case "3bet":
      next.events.push({ who: seatIdx, kind: "3bet" });
      ev.act.vpip = true; ev.act.pfr = true; ev.act.threeBet = true;
      next.raiseCount = 2;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      _markRaiserFacing3b(next, h);
      break;
    case "sqz":
      next.events.push({ who: seatIdx, kind: "sqz" });
      ev.act.vpip = true; ev.act.pfr = true; ev.act.sqz = true;
      next.raiseCount = 2;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      _markRaiserFacing3b(next, h);
      break;
    case "4bet":
      next.events.push({ who: seatIdx, kind: "4bet" });
      ev.act.vpip = true; ev.act.pfr = true;
      if (ev.act.rfi) { ev.opp.rfi4b = true; ev.act.rfi4b = true; }
      // Cold 4bet: 4betting without having acted before (not RFI-er)
      if (!ev.act.rfi) {
        const hadAction = ev.act.limp || ev.act.flat || ev.act.flatMw
          || ev.act.threeBet || ev.act.sqz;
        if (!hadAction) ev.act.cold4b = true;
      }
      next.raiseCount = 3;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      _markPrevRaiserFacing4b(next, h);
      break;
    case "5bet":
      next.events.push({ who: seatIdx, kind: "5bet" });
      ev.act.vpip = true; ev.act.pfr = true;
      if (ev.act.threeBet) { ev.opp.threeBet5b = true; ev.act.threeBet5b = true; }
      if (ev.act.sqz) { ev.opp.sqz5b = true; ev.act.sqz5b = true; }
      next.raiseCount = 4;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      break;
    case "6bet":
      next.events.push({ who: seatIdx, kind: "6bet" });
      ev.act.vpip = true; ev.act.pfr = true;
      next.raiseCount = 5;
      next.lastRaiserSeat = seatIdx;
      next.callersSinceLastRaise = 0;
      next.actedSinceLastRaise = new Set([seatIdx]);
      break;
  }

  if (isActionClosed(next)) {
    for (const s of [...next.inHand]) {
      if (!next.actedSinceLastRaise.has(s) && s !== next.lastRaiserSeat) {
        const pev = next.playerEvents[s];
        if (pev) setOpp(pev, next);
        // Phase 2 auto-fold for players who already acted
        if (pev) _resolvePhase2Fold(pev, next);
        next.events.push({ who: s, kind: "fold" });
        next.inHand.delete(s);
        next.actedSinceLastRaise.add(s);
      }
    }
    next.closed = true;
  }

  return next;
}

function _resolvePhase2Fold(ev, h) {
  if (ev.act.limp && h.raiseCount >= 1) {
    ev.opp.limpFold = true; ev.act.limpFold = true;
  }
  if (ev.act.rfi && h.raiseCount >= 2) {
    ev.opp.rfiFold = true; ev.act.rfiFold = true;
  }
  if (ev.act.threeBet && h.raiseCount >= 3) {
    ev.opp.threeBetFold = true; ev.act.threeBetFold = true;
  }
  if (ev.act.sqz && h.raiseCount >= 3) {
    ev.opp.sqzFold = true; ev.act.sqzFold = true;
  }
}

function _resolvePhase2Call(ev, h) {
  let resolved = false;
  if (ev.act.limp && h.raiseCount >= 1) {
    ev.opp.limpCall = true; ev.act.limpCall = true;
    resolved = true;
  }
  if (ev.act.rfi && h.raiseCount >= 2) {
    ev.opp.rfiCall = true; ev.act.rfiCall = true;
    resolved = true;
  }
  if (ev.act.threeBet && h.raiseCount >= 3) {
    ev.opp.threeBetCall = true; ev.act.threeBetCall = true;
    resolved = true;
  }
  if (ev.act.sqz && h.raiseCount >= 3) {
    ev.opp.sqzCall = true; ev.act.sqzCall = true;
    resolved = true;
  }
  return resolved;
}

function _markRaiserFacing3b(next, h) {
  if (h.lastRaiserSeat !== null) {
    const raiserEv = next.playerEvents[h.lastRaiserSeat];
    if (raiserEv && raiserEv.act.rfi) {
      raiserEv.opp.rfiFold = true;
      raiserEv.opp.rfiCall = true;
      raiserEv.opp.rfi4b = true;
    }
  }
}

function _markPrevRaiserFacing4b(next, h) {
  if (h.lastRaiserSeat !== null) {
    const prevEv = next.playerEvents[h.lastRaiserSeat];
    if (prevEv) {
      if (prevEv.act.threeBet) {
        prevEv.opp.threeBetFold = true;
        prevEv.opp.threeBetCall = true;
        prevEv.opp.threeBet5b = true;
      }
      if (prevEv.act.sqz) {
        prevEv.opp.sqzFold = true;
        prevEv.opp.sqzCall = true;
        prevEv.opp.sqz5b = true;
      }
    }
  }
}

/* =============================================================================
   6. ROOT APP COMPONENT
   ========================================================================== */

function App() {
  // ── Persistent state ──
  const [tableSize, setTableSize] = useState(() => loadJSON(STORAGE_KEYS.tableSize, 6));
  const [playerDB, setPlayerDB] = useState(() => loadJSON(STORAGE_KEYS.players, []));
  const [seats, setSeats] = useState(() => {
    const initSize = loadJSON(STORAGE_KEYS.tableSize, 6);
    const stored = loadJSON(STORAGE_KEYS.seats, null);
    // Validate: right length, Hero present, all seats have playerId
    const valid = stored
      && Array.isArray(stored)
      && stored.length === initSize
      && stored.some((s) => s && s.isHero)
      && stored.every((s) => s && typeof s === "object");
    if (!valid) return makeInitialSeats(initSize);
    // Migrate: ensure status + stable random IDs
    const migrated = [];
    let usedNums = new Set();
    stored.forEach((s) => {
      if (s?.playerId && !s.isHero) {
        const n = randomNumFromId(s.playerId);
        if (n !== null) usedNums.add(n);
      }
    });
    const nextNum = () => {
      let i = 1;
      while (usedNums.has(i)) i++;
      usedNums.add(i);
      return i;
    };
    stored.forEach((s) => {
      let pid = s.playerId;
      if (!pid) {
        pid = s.isHero ? "hero" : `random_${nextNum()}`;
      } else if (!s.isHero && isRandomId(pid) && randomNumFromId(pid) === null) {
        // Stale random id from previous version → re-number
        pid = `random_${nextNum()}`;
      }
      migrated.push({
        ...s,
        status: s.status || "active",
        playerId: pid,
      });
    });
    return migrated;
  });
  const [btnSeatIdx, setBtnSeatIdx] = useState(() => loadJSON(STORAGE_KEYS.btnSeatIdx, 0));
  const [options, setOptions] = useState(() => loadJSON(STORAGE_KEYS.options, {
    straddle: false, mississippi: false, statsView: "session",
  }));

  // ── Volatile state ──
  const [handLog, setHandLog] = useState([]); // array of { seats, btnSeatIdx, hand, playerDB } snapshots
  const [hand, setHand] = useState(null);
  const [editingSeat, setEditingSeat] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showShowdown, setShowShowdown] = useState(false);
  const [reorderMode, setReorderMode] = useState(false);
  // pendingAssign = { seatIdx, playerId, sessionStats } — waiting for keep/fresh choice
  const [pendingAssign, setPendingAssign] = useState(null);

  // Stats session-only for Random pseudo players (declared early so it's accessible in effects)
  const [randomPlayers, setRandomPlayers] = useState(() => loadJSON(STORAGE_KEYS.randomPlayers, {}));
  useEffect(() => saveJSON(STORAGE_KEYS.randomPlayers, randomPlayers), [randomPlayers]);

  // ── Session / Room / Blind ──
  const [rooms, setRooms] = useState(() => loadJSON(STORAGE_KEYS.rooms, DEFAULT_ROOMS));
  const [blindLevels, setBlindLevels] = useState(() => loadJSON(STORAGE_KEYS.blinds, DEFAULT_BLINDS));
  const [session, setSession] = useState(() => {
    const stored = loadJSON(STORAGE_KEYS.session, null);
    if (stored && stored.id) return stored;
    return { id: 1, room: "", blind: "", startTime: Date.now(), handCount: 0, active: false };
  });
  useEffect(() => saveJSON(STORAGE_KEYS.session, session), [session]);
  useEffect(() => saveJSON(STORAGE_KEYS.rooms, rooms), [rooms]);
  useEffect(() => saveJSON(STORAGE_KEYS.blinds, blindLevels), [blindLevels]);

  // Timer tick (only when session active)
  const [elapsed, setElapsed] = useState("00:00");
  useEffect(() => {
    if (!session.active) { setElapsed("00:00"); return; }
    const tick = () => {
      const diff = Math.floor((Date.now() - session.startTime) / 1000);
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      setElapsed(h > 0
        ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
        : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
      );
    };
    tick();
    const iv = setInterval(tick, 1000);
    return () => clearInterval(iv);
  }, [session.startTime, session.active]);

  // ── Session history ──
  const [sessionHistory, setSessionHistory] = useState(() => loadJSON(STORAGE_KEYS.sessionHistory, []));
  useEffect(() => saveJSON(STORAGE_KEYS.sessionHistory, sessionHistory), [sessionHistory]);

  // ── Views (modals) ──
  const [showSessionHistory, setShowSessionHistory] = useState(false);
  const [observingPlayer, setObservingPlayer] = useState(null);

  const startSession = () => {
    if (!session.room || !session.blind) {
      setShowSettings(true);
      return;
    }
    setSession((s) => ({ ...s, active: true, startTime: Date.now(), handCount: 0 }));
    // Reset table: all seats fresh Random, all active
    const fresh = [];
    let counter = 0;
    for (let i = 0; i < tableSize; i++) {
      if (i === 0) {
        fresh.push({ playerId: "hero", isHero: true, status: "active" });
      } else {
        counter += 1;
        fresh.push({ playerId: `random_${counter}`, isHero: false, status: "active" });
      }
    }
    setSeats(fresh);
    setBtnSeatIdx(0);
    // Reset all session stats
    setPlayerDB((prev) => prev.map((p) => ({ ...p, sessionStats: emptyStats() })));
    setRandomPlayers({});
    setHandLog([]);
    setEditingSeat(null);
    setReorderMode(false);
    // Build initial hand
    const layout = computeLayout(fresh, 0, options);
    setHand(buildInitialHand(fresh, layout, options));
  };

  const endSession = () => {
    // Save current session to history
    const duration = Math.floor((Date.now() - session.startTime) / 1000);
    const entry = {
      id: session.id,
      room: session.room,
      blind: session.blind,
      handCount: session.handCount,
      duration,
      date: new Date(session.startTime).toISOString(),
    };
    setSessionHistory((prev) => [...prev, entry]);
    // Reset session stats
    setPlayerDB((prev) => prev.map((p) => ({ ...p, sessionStats: emptyStats() })));
    setRandomPlayers({});
    setSession((s) => ({ ...s, id: s.id + 1, startTime: Date.now(), handCount: 0, active: false }));
    setHandLog([]);
  };

  // ── Persist on changes ──
  useEffect(() => saveJSON(STORAGE_KEYS.tableSize, tableSize), [tableSize]);
  useEffect(() => saveJSON(STORAGE_KEYS.players, playerDB), [playerDB]);
  useEffect(() => saveJSON(STORAGE_KEYS.seats, seats), [seats]);

  // Rebuild hand positions when seats change (swap, status change) — only if no hand in progress
  useEffect(() => {
    if (!hand || hand.events.length > 0) return;
    const layout = computeLayout(seats, btnSeatIdx, options);
    setHand(buildInitialHand(seats, layout, options));
  }, [seats, btnSeatIdx, options.straddle, options.mississippi]);
  useEffect(() => saveJSON(STORAGE_KEYS.btnSeatIdx, btnSeatIdx), [btnSeatIdx]);
  useEffect(() => saveJSON(STORAGE_KEYS.options, options), [options]);

  // ── Sync seats with table size ──
  useEffect(() => {
    setSeats((prev) => {
      if (prev.length === tableSize) return prev;
      const next = [...prev];
      while (next.length < tableSize) {
        const num = nextRandomNum(next, randomPlayers);
        next.push({
          playerId: `random_${num}`,
          isHero: false,
          status: "active",
        });
      }
      while (next.length > tableSize) next.pop();
      if (!next.some((s) => s && s.isHero)) {
        next[0] = { ...next[0], isHero: true, playerId: "hero" };
      }
      return next;
    });
    if (btnSeatIdx >= tableSize) setBtnSeatIdx(0);
  }, [tableSize]);

  // ── Compute layout & build new hand on relevant changes ──
  // Auto-move BTN if it lands on an inactive seat
  useEffect(() => {
    if (!seats || seats.length === 0) return;
    const curr = seats[btnSeatIdx];
    if (!curr || !isSeatPlayable(curr)) {
      // Find next playable seat clockwise
      for (let i = 1; i <= seats.length; i++) {
        const cand = (btnSeatIdx + i) % seats.length;
        if (isSeatPlayable(seats[cand])) {
          setBtnSeatIdx(cand);
          return;
        }
      }
    }
  }, [seats, btnSeatIdx]);

  const layout = useMemo(
    () => computeLayout(seats, btnSeatIdx, options),
    [seats, btnSeatIdx, options]
  );

  useEffect(() => {
    const freshLayout = computeLayout(seats, btnSeatIdx, options);
    setHand(buildInitialHand(seats, freshLayout, options));
    // eslint-disable-next-line
  }, [seats, btnSeatIdx, options.straddle, options.mississippi]);

  // ── Helpers to mutate playerDB ──

  // Resolve a seat's player data. Returns {id, name, sessionStats, globalStats, isRandom}.
  // For random seats: pulls from randomPlayers, creating entry on demand.
  // Random name is derived from the playerId itself (stable across seat swaps).
  const getPlayerForSeat = (seatIdx) => {
    const seat = seats[seatIdx];
    if (!seat || !seat.playerId) return null;
    const pid = seat.playerId;
    if (isRandomId(pid)) {
      const existing = randomPlayers[pid];
      if (existing) {
        return {
          id: pid,
          name: existing.name,
          sessionStats: existing.sessionStats || emptyStats(),
          globalStats: emptyStats(),
          isRandom: true,
        };
      }
      // Stable name: derived from the ID itself
      const num = randomNumFromId(pid);
      return {
        id: pid,
        name: `Random#${num ?? "?"}`,
        sessionStats: emptyStats(),
        globalStats: emptyStats(),
        isRandom: true,
      };
    }
    const p = playerDB.find((pp) => pp.id === pid);
    if (!p) return null;
    return { ...p, isRandom: false };
  };

  const ensurePlayerInDB = (name) => {
    const normalized = normalizeName(name);
    if (!normalized) return null;
    if (isRandomName(normalized)) {
      alert(`"${normalized}" est un nom réservé. Utilise un autre pseudo.`);
      return null;
    }
    const existing = playerDB.find(

function makeInitialSeats(n) {
  const arr = [];
  let randomCounter = 0;
  for (let i = 0; i < n; i++) {
    if (i === 0) {
      arr.push({ playerId: "hero", isHero: true, status: "active" });
    } else {
      randomCounter += 1;
      arr.push({
        playerId: `random_${randomCounter}`,
        isHero: false,
        status: "active",
      });
    }
  }
  return arr;
}

// Extract the display number N from a random playerId like "random_3" → 3
function randomNumFromId(id) {
  if (!isRandomId(id)) return null;
  const m = /^random_(\d+)$/.exec(id);
  return m ? parseInt(m[1], 10) : null;
}

// Find the smallest unused random number given seats & randomPlayers keys
function nextRandomNum(seats, randomPlayersObj = {}) {
  const used = new Set();
  (seats || []).forEach((s) => {
    if (s?.playerId) {
      const n = randomNumFromId(s.playerId);
      if (n !== null) used.add(n);
    }
  });
  Object.keys(randomPlayersObj).forEach((id) => {
    const n = randomNumFromId(id);
    if (n !== null) used.add(n);
  });
  let i = 1;
  while (used.has(i)) i++;
  return i;
}

// A "random" player is a temporary session-only pseudo like Random#1, Random#2, ...
// Stats for these are session-only (not added to global), and they can't be saved to DB.
// Normalize player name: uppercase, remove accents
function normalizeName(name) {
  return name
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}

function isRandomId(id) {
  return typeof id === "string" && id.startsWith("random_");
}
function isRandomName(name) {
  if (!name) return false;
  return /^random\s*#?\s*\d*$/i.test(name.trim());
}
function isSeatPlayable(seat) {
  return seat && seat.status !== "open" && seat.status !== "break";
}

function cloneHand(h) {
  return {
    ...h,
    inHand: new Set(h.inHand),
    actedSinceLastRaise: new Set(h.actedSinceLastRaise),
    events: [...h.events],
    posts: h.posts ? new Set(h.posts) : new Set(),
    playerEvents: h.playerEvents.map((e) => e ? {
      dealt: e.dealt,
      opp: { ...e.opp },
      act: { ...e.act },
      postChecked: e.postChecked || false,
    } : null),
  };
}

function singleHandToStats(ev, position, sdCards) {
  const out = emptyStats();
  out.hands = 1;
  STAT_KEYS.forEach((k) => {
    out[k] = {
      opp: (ev.opp && ev.opp[k]) ? 1 : 0,
      act: (ev.act && ev.act[k]) ? 1 : 0,
    };
  });
  if (position) {
    const posStats = { hands: 1 };
    STAT_KEYS.forEach((k) => { posStats[k] = { ...out[k] }; });
    if (sdCards && sdCards.length > 0) {
      posStats.showdowns = [sdCards.join("")];
    }
    out.byPos[position] = posStats;
  }
  return out;
}

/* =============================================================================
