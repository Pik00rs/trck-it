function BTNPlacer({ seats, btnSeatIdx, setBtnSeatIdx }) {
  const heroIdx = seats.findIndex((s) => s && s.isHero);
  // Labels: Hero=H, others=1..N in the order they appear (excluding Hero)
  let counter = 0;
  const labels = seats.map((s, i) => {
    if (s && s.isHero) return "H";
    counter += 1;
    return String(counter);
  });
  return (
    <div className="btn-placer">
      <span className="bp-lbl">BTN →</span>
      {seats.map((s, i) => {
        const inactive = !isSeatPlayable(s);
        return (
          <button
            key={i}
            className={`bp-dot ${i === btnSeatIdx ? "on" : ""} ${inactive ? "muted" : ""}`}
            onClick={() => !inactive && setBtnSeatIdx(i)}
            disabled={inactive}
          >
            {labels[i]}
          </button>
        );
      })}
    </div>
  );
}

function PlayerList({
  hand, seats, getPlayerForSeat, onAction,
  onStartEdit, onSetSeatStatus,
  reorderMode, moveSeat, canReorder,
}) {
  const heroSeatIdx = seats.findIndex((s) => s && s.isHero);
  const others = seats.map((_, i) => i).filter((i) => i !== heroSeatIdx);
  const renderOrder = heroSeatIdx !== -1 ? [heroSeatIdx, ...others] : others;

  // Swap state: swapFrom = seatIdx of the first player selected for swap
  const [swapFrom, setSwapFrom] = useState(null);

  const handleSwapClick = (seatIdx) => {
    if (!canReorder) return;
    if (seats[seatIdx]?.isHero) return;
    if (swapFrom === null) {
      // First tap: select this seat
      setSwapFrom(seatIdx);
    } else if (swapFrom === seatIdx) {
      // Tap same seat: cancel
      setSwapFrom(null);
    } else {
      // Second tap: swap and done
      moveSeat(swapFrom, seatIdx);
      setSwapFrom(null);
    }
  };

  // Cancel swap when leaving reorder mode
  useEffect(() => { if (!reorderMode) setSwapFrom(null); }, [reorderMode]);

  return (
    <section className="player-list">
      {renderOrder.map((seatIdx, visualOrder) => {
        const seat = seats[seatIdx];
        if (!seat) return null;
        const player = getPlayerForSeat(seatIdx);
        if (!player) return null;
        const pos = hand.positions[seatIdx];
        const seatLabel = seat.isHero ? "H" : String(visualOrder);

        const folded = !hand.inHand.has(seatIdx) && hand.events.some(e => e.who === seatIdx);
        const allActions = hand.events.filter(e => e.who === seatIdx);
        const hasActedSinceLastRaise = hand.actedSinceLastRaise.has(seatIdx);
        const canAct = !hand.closed && !folded && hand.inHand.has(seatIdx) && !hasActedSinceLastRaise;
        const situation = canAct ? getSituationFor(hand, seatIdx) : null;

        const isSwapFrom = swapFrom === seatIdx;
        const isSwapTarget = swapFrom !== null && swapFrom !== seatIdx && !seat.isHero;

        return (
          <PlayerRow
            key={`seat-${seatIdx}`}
            seatIdx={seatIdx}
            seatLabel={seatLabel}
            player={player}
            pos={pos}
            isHero={seat.isHero}
            folded={folded}
            allActions={allActions}
            situation={situation}
            hasActedSinceLastRaise={hasActedSinceLastRaise}
            handClosed={hand.closed}
            seatStatus={seat.status || "active"}
            onAction={(t) => onAction(seatIdx, t)}
            onStartEdit={() => onStartEdit(seatIdx)}
            onSeatOpen={() => onSetSeatStatus(seatIdx, "open")}
            onBreak={() => onSetSeatStatus(seatIdx, "break")}
            onActivate={() => onSetSeatStatus(seatIdx, "active")}
            reorderMode={reorderMode}
            canReorder={canReorder}
            isSwapFrom={isSwapFrom}
            isSwapTarget={isSwapTarget}
            onSwapClick={() => handleSwapClick(seatIdx)}
          />
        );
      })}
      {swapFrom !== null && (
        <div className="swap-hint">Tape un autre siège pour intervertir</div>
      )}
    </section>
  );
}

function PlayerRow({
  seatIdx, seatLabel, player, pos, isHero, folded, allActions, situation,
  hasActedSinceLastRaise, handClosed, seatStatus,
  onAction, onStartEdit, onSeatOpen, onBreak, onActivate,
  reorderMode, canReorder,
  isSwapFrom, isSwapTarget, onSwapClick,
}) {
  const [menuOpen, setMenuOpen] = useState(false);
  const isOpen = seatStatus === "open";
  const isBreak = seatStatus === "break";
  const inactive = isOpen || isBreak;
  const hasActions = allActions && allActions.length > 0;

  return (
    <div
      data-seat={seatIdx}
      className={`row ${isHero ? "hero" : ""} ${folded ? "folded" : ""} ${situation ? "can-act" : ""} ${isOpen ? "seat-open" : ""} ${isBreak ? "seat-break" : ""} ${isSwapFrom ? "swap-from" : ""} ${isSwapTarget ? "swap-target" : ""}`}
      onClick={reorderMode && canReorder && (isSwapTarget || (!isHero && !isSwapFrom)) ? onSwapClick : undefined}
    >
      <div className="row-left">
        <div className="row-pos">
          <span className={`pos-name pos-${(pos || "").toLowerCase().replace(/[^a-z]/g, "")}`}>
            {inactive ? "—" : (pos || "?")}
          </span>
          <span className="seat-id">{seatLabel}</span>
        </div>

        <div className="row-info">
          <button
            className={`row-name ${isHero ? "hero-name" : ""} ${player?.isRandom ? "random-name" : ""} ${inactive ? "inactive-name" : ""}`}
            onClick={reorderMode ? undefined : (isHero ? undefined : onStartEdit)}
          >
            {player?.name || "?"}
          </button>

          {isOpen && <span className="row-tag-inline tag-color-seatopen">SEAT OPEN</span>}
          {isBreak && <span className="row-tag-inline tag-color-break">BREAK</span>}
          {!inactive && hasActions && !reorderMode && (
            <div className="row-actions-history">
              {allActions.map((ev, i) => (
                <span key={i} className={`action-label action-${ev.kind}`}>
                  {ACTION_LABELS[ev.kind] || ev.kind.toUpperCase()}
                </span>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="row-right">
        {reorderMode ? (
          isHero ? (
            <span className="row-status">hero</span>
          ) : !canReorder ? (
            <span className="row-status muted">locked</span>
          ) : isSwapFrom ? (
            <span className="row-status swap-label">SELECTED</span>
          ) : (
            <span className="row-status swap-label-target">TAP</span>
          )
        ) : inactive ? (
          <button className="act act-neutral" onClick={onActivate}>
            ← ACTIVE
          </button>
        ) : situation ? (
          menuOpen ? (
            <div className="act-row">
              <button className="act act-mute" onClick={() => setMenuOpen(false)}>
                <X size={10}/>
              </button>
              <button className="act act-danger" onClick={() => { setMenuOpen(false); onSeatOpen(); }}>
                OPEN
              </button>
              <button className="act act-warn" onClick={() => { setMenuOpen(false); onBreak(); }}>
                BREAK
              </button>
            </div>
          ) : (
            <>
              <div className="act-row">
                {situation.actions.map((a) => (
                  <button
                    key={a.type}
                    className={`act act-${a.tone}`}
                    onClick={() => onAction(a.type)}
                  >
                    {a.label}
                  </button>
                ))}
              </div>
              {!isHero && (
                <button
                  className="row-menu-btn"
                  onClick={() => setMenuOpen(true)}
                  title="Seat open / break"
                >⋮</button>
              )}
            </>
          )
        ) : folded ? (
          <span className="row-status muted">—</span>
        ) : hasActedSinceLastRaise && !handClosed ? (
          <span className="row-status">wait</span>
        ) : null}
      </div>
    </div>
  );
}

function NameModal({
  currentName, playerDB, seats, onPick, onCreate, onRename, onClose,
  mode, // "assign" | "rename"
}) {
  const [text, setText] = useState(currentName || "");
  const inputRef = useRef(null);

  // IDs of players already seated at the table
  const seatedIds = useMemo(() => {
    const ids = new Set();
    (seats || []).forEach((s) => { if (s?.playerId && !isRandomId(s.playerId)) ids.add(s.playerId); });
    return ids;
  }, [seats]);

  useEffect(() => {
    const t = setTimeout(() => {
      inputRef.current?.focus();
      inputRef.current?.select();
    }, 60);
    return () => clearTimeout(t);
  }, []);

  const matches = useMemo(() => {
    const q = normalizeName(text);
    const pool = playerDB.filter((p) => p.id !== "hero");
    if (!q) return pool.slice(0, 30);
    return pool
      .filter((p) => normalizeName(p.name).includes(q))
      .slice(0, 30);
  }, [text, playerDB]);

  const normalized = normalizeName(text);
  const exactMatch = playerDB.find(
    (p) => p.id !== "hero" && normalizeName(p.name) === normalized
  );

  const handleSubmit = (e) => {
    e?.preventDefault?.();
    if (!normalized) return onClose();
    if (exactMatch && !seatedIds.has(exactMatch.id)) onPick(exactMatch.id);
    else if (!exactMatch) onCreate(normalized);
  };

  const handleCreate = () => {
    if (!normalized) return;
    onCreate(normalized);
  };

  const handleRenameKeep = () => {
    if (!normalized || !onRename) return;
    onRename(normalized, true);
  };

  const handleRenameReset = () => {
    if (!normalized || !onRename) return;
    onRename(normalized, false);
  };

  return (
    <div className="modal-bg" onClick={(e) => {
      if (e.target === e.currentTarget) onClose();
    }}>
      <div className="modal name-modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{mode === "rename" ? "RENOMMER" : "CHOISIR JOUEUR"}</h3>
          <button className="modal-close" onClick={onClose}><X size={14}/></button>
        </div>
        <form className="modal-body" onSubmit={handleSubmit}>
          <input
            ref={inputRef}
            className="name-input"
            value={text}
            onChange={(e) => setText(e.target.value)}
            placeholder="nom du joueur..."
            maxLength={20}
            autoComplete="off"
            autoCorrect="off"
            autoCapitalize="off"
            spellCheck="false"
          />

          <div className="name-actions">
            {mode === "rename" && exactMatch && normalizeName(exactMatch.name) === normalized ? null : normalized && !exactMatch ? (
              <button type="button" className="name-btn create" onClick={handleCreate}>
                <Plus size={14}/> CRÉER "{normalized}"
              </button>
            ) : null}
            {mode === "rename" && normalized && normalized !== normalizeName(currentName) && (
              <>
                <button type="button" className="name-btn rename" onClick={handleRenameKeep}>
                  REMPLACER (garder stats session)
                </button>
                <button type="button" className="name-btn rename-reset" onClick={handleRenameReset}>
                  REMPLACER (fresh)
                </button>
              </>
            )}
          </div>

          {mode === "assign" && (
            <>
              <div className="name-divider">
                <span>{matches.length > 0 ? "JOUEURS EXISTANTS" : "AUCUN JOUEUR"}</span>
              </div>
              <div className="name-list">
                {matches.map((p) => {
                  const isSeated = seatedIds.has(p.id);
                  return (
                    <button
                      key={p.id}
                      type="button"
                      className={`name-item ${isSeated ? "name-item-seated" : ""}`}
                      onClick={() => !isSeated && onPick(p.id)}
                      disabled={isSeated}
                    >
                      <span className="ni-name">{p.name}</span>
                      {isSeated && <span className="ni-seated">À TABLE</span>}
                      <span className="ni-meta">{(p.globalStats || emptyStats()).hands} mains</span>
                    </button>
                  );
                })}
                {matches.length === 0 && !normalized && (
                  <div className="name-empty">Base vide. Tape un nom pour créer le premier joueur.</div>
                )}
              </div>
            </>
          )}
        </form>
      </div>
    </div>
  );
}

const DEFAULT_STATS_COLS = ["vpip", "pfr", "rfi", "threeBet", "sqz"];
const POSITION_ORDER = ["BU", "CO", "HJ", "MP", "U2", "U1", "U0", "U-1", "SB", "BB", "STR", "MSP"];

function StatsTable({ seats, getPlayerForSeat, view, setView, onResetSession }) {
  const [fullTable, setFullTable] = useState(false);
  // drillCell = { playerId, statKey } or null
  const [drillCell, setDrillCell] = useState(null);

  const heroSeatIdx = seats.findIndex((s) => s && s.isHero);
  const others = seats.map((_, i) => i).filter((i) => i !== heroSeatIdx);
  const orderedIdx = heroSeatIdx !== -1 ? [heroSeatIdx, ...others] : others;

  const rows = orderedIdx
    .map((i) => {
      const p = getPlayerForSeat(i);
      if (!p) return null;
      const seat = seats[i];
      // Hide seat-open players from stats
      if (seat.status === "open") return null;
      return { ...p, seatIdx: i, isHero: seat.isHero };
    })
    .filter(Boolean)
    .filter((r) => view === "session" || !r.isRandom);

  const cols = fullTable ? STAT_KEYS : DEFAULT_STATS_COLS;
  const gridCols = `90px 36px repeat(${cols.length}, 1fr)`;

  const toggleDrill = (playerId, statKey) => {
    setDrillCell((prev) =>
      prev && prev.playerId === playerId && prev.statKey === statKey
        ? null
        : { playerId, statKey }
    );
  };

  return (
    <section className="stats">
      <div className="stats-head">
        <h2>&gt; STATS</h2>
        <div className="stats-toggle">
          <button className={`tog ${view === "session" ? "on" : ""}`}
            onClick={() => setView("session")}>SESSION</button>
          <button className={`tog ${view === "global" ? "on" : ""}`}
            onClick={() => setView("global")}>GLOBAL</button>
          <button className={`tog ${fullTable ? "on" : ""}`}
            onClick={() => setFullTable((f) => !f)}>FULL</button>
        </div>
      </div>
      <div className="stats-scroll">
        <div className="stats-grid" style={{ gridTemplateColumns: gridCols }}>
          <div className="sh">PLAYER</div>
          <div className="sh">N</div>
          {cols.map((k) => (
            <div key={k} className="sh">{STAT_LABELS[k] || k}</div>
          ))}
          {rows.map((p) => {
            const v = view === "session" ? p.sessionStats : p.globalStats;
            if (!v) return null;
            const isDrilled = drillCell && drillCell.playerId === p.id;
            return (
              <React.Fragment key={p.id}>
                <div className={`sc name ${p.isHero ? "hero-row" : ""} ${p.isRandom ? "random-row" : ""}`}>{p.name}</div>
                <div className="sc dim mono">{v.hands || 0}</div>
                {cols.map((k) => {
                  const s = v[k] || { opp: 0, act: 0 };
                  const isActive = isDrilled && drillCell.statKey === k;
                  return (
                    <StatCell
                      key={k}
                      s={s}
                      kind={k}
                      active={isActive}
                      onClick={() => toggleDrill(p.id, k)}
                    />
                  );
                })}
                {/* Drill row: position breakdown */}
                {isDrilled && (() => {
                  const byPos = v.byPos || {};
                  const sk = drillCell.statKey;
                  const showSDPos = drillCell.showSDPos || null;
                  const toggleSD = (pos) => setDrillCell((prev) => ({
                    ...prev,
                    showSDPos: prev.showSDPos === pos ? null : pos,
                  }));
                  return (
                    <div className="drill-row" style={{ gridColumn: `1 / -1` }}>
                      <div className="drill-row-head">
                        <span>{p.name} — {STAT_LABELS[sk] || sk}</span>
                        <button className="drill-close" onClick={() => setDrillCell(null)}><X size={10}/></button>
                      </div>
                      <div className="drill-row-cols">
                        {POSITION_ORDER.map((pos) => {
                          const posData = byPos[pos];
                          const ps = posData?.[sk] || { opp: 0, act: 0 };
                          const hasData = posData && posData.hands > 0;
                          const val = !hasData || ps.opp === 0 ? null : pct(ps.opp, ps.act);
                          const sds = posData?.showdowns || [];
                          const hasSD = sds.length > 0;
                          return (
                            <div key={pos} className={`drill-col ${hasSD ? "drill-col-sd" : ""}`}
                              onClick={hasSD ? () => toggleSD(pos) : undefined}>
                              <span className="drill-col-pos">{pos}</span>
                              <span className="drill-col-val" style={{ color: val === null ? "var(--dim)" : statColor(val, sk) }}>
                                {val === null ? "NA" : `${val}`}
                              </span>
                              <span className="drill-col-frac">
                                {hasData ? `${ps.act}/${ps.opp}` : "—"}
                              </span>
                              {hasSD && <span className="drill-sd-badge">🃏{sds.length}</span>}
                              {showSDPos === pos && (
                                <div className="drill-sd-list">
                                  {sds.map((h, i) => <span key={i} className="drill-sd-hand">{h}</span>)}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </React.Fragment>
            );
          })}
        </div>
      </div>
      <div className="stats-footer">
        <button className="reset-link" onClick={onResetSession}>reset session</button>
      </div>
    </section>
  );
}

function StatCell({ s, kind, active, onClick }) {
  if (!s) return <div className="sc"><span className="sc-val" style={{ color: "var(--dim)" }}>—</span></div>;
  const v = pct(s.opp, s.act);
  return (
    <div className={`sc sc-clickable ${active ? "sc-active" : ""}`} onClick={onClick}>
      <span className="sc-val" style={{ color: statColor(v, kind) }}>{fmt(v)}</span>
      <span className="sc-frac">{s.act}/{s.opp}</span>
    </div>
  );
}

function SettingsModal({
  session, setSession, rooms, setRooms, blindLevels, setBlindLevels, onClose,
}) {
  const [newRoom, setNewRoom] = useState("");
  const [newBlind, setNewBlind] = useState("");
  const locked = session.active; // Can't change room/blind during active session

  const addRoom = () => {
    const t = newRoom.trim();
    if (t && !rooms.includes(t)) {
      setRooms([...rooms, t]);
      setSession((s) => ({ ...s, room: t })); // auto-select
      setNewRoom("");
    }
  };
  const addBlind = () => {
    const t = newBlind.trim();
    if (t && !blindLevels.includes(t)) {
      setBlindLevels([...blindLevels, t]);
      setSession((s) => ({ ...s, blind: t })); // auto-select
      setNewBlind("");
    }
  };

  return (
    <div className="modal-bg" onClick={(e) => {
      if (e.target === e.currentTarget) onClose();
    }}>
      <div className="modal modal-wide">
        <div className="modal-head">
          <h3>SETTINGS</h3>
          <button className="modal-close" onClick={onClose}><X size={14}/></button>
        </div>
        <div className="modal-body" style={{ maxHeight: "70vh", overflowY: "auto" }}>

          {locked && (
            <p className="opt-hint" style={{ color: "var(--cy-yellow)", marginBottom: 10 }}>
              Session en cours — room et blind verrouillés.
            </p>
          )}

          {/* Room editor */}
          <div className="settings-section">
            <span className="ss-label">ROOM</span>
            <div className="ss-chips">
              {rooms.map((r) => (
                <div key={r} className="ss-chip-wrap">
                  <button
                    className={`ss-chip ${session.room === r ? "on" : ""}`}
                    onClick={() => !locked && setSession((s) => ({ ...s, room: r }))}
                    disabled={locked}
                  >{r}</button>
                  {!locked && (
                    <button className="ss-chip-del" onClick={() => {
                      setRooms((prev) => prev.filter((x) => x !== r));
                      if (session.room === r) setSession((s) => ({ ...s, room: "" }));
                    }}><X size={8}/></button>
                  )}
                </div>
              ))}
            </div>
            {!locked && (
              <div className="ss-add-row">
                <input className="ss-input" placeholder="New room..."
                  value={newRoom} onChange={(e) => setNewRoom(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && addRoom()}/>
                <button className="ss-add-btn" onClick={addRoom}><Plus size={12}/></button>
              </div>
            )}
          </div>

          {/* Blind editor */}
          <div className="settings-section">
            <span className="ss-label">BLIND</span>
            <div className="ss-chips">
              {blindLevels.map((b) => (
                <div key={b} className="ss-chip-wrap">
                  <button
                    className={`ss-chip ${session.blind === b ? "on" : ""}`}
                    onClick={() => !locked && setSession((s) => ({ ...s, blind: b }))}
                    disabled={locked}
                  >{b}</button>
                  {!locked && (
                    <button className="ss-chip-del" onClick={() => {
                      setBlindLevels((prev) => prev.filter((x) => x !== b));
                      if (session.blind === b) setSession((s) => ({ ...s, blind: "" }));
                    }}><X size={8}/></button>
                  )}
                </div>
              ))}
            </div>
            {!locked && (
              <div className="ss-add-row">
                <input className="ss-input" placeholder="New blind..."
                  value={newBlind} onChange={(e) => setNewBlind(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && addBlind()}/>
                <button className="ss-add-btn" onClick={addBlind}><Plus size={12}/></button>
              </div>
            )}
          </div>

        </div>
        <div className="modal-foot">
          <button className="next-hand" onClick={onClose} style={{ animation: "none", width: "100%" }}>
            VALIDER
          </button>
        </div>
      </div>
    </div>
  );
}

function ShowdownModal({ hand, seats, getPlayerForSeat, onClose, onValidate }) {
  const survivors = [...hand.inHand];
  const [cards, setCards] = useState({}); // { seatIdx: ["As", "Kh"], ... }
  const [pickingFor, setPickingFor] = useState(null); // seatIdx or null

  const RANKS = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
  const SUITS = [
    { key: "s", symbol: "♠", color: "#eee" },
    { key: "h", symbol: "♥", color: "#ff4d6a" },
    { key: "d", symbol: "♦", color: "#4da6ff" },
    { key: "c", symbol: "♣", color: "#50d860" },
  ];

  // Cards already picked (by any player)
  const usedCards = new Set();
  Object.values(cards).forEach((arr) => arr.forEach((c) => usedCards.add(c)));

  const toggleCard = (card) => {
    if (pickingFor === null) return;
    const curr = cards[pickingFor] || [];
    if (curr.includes(card)) {
      setCards({ ...cards, [pickingFor]: curr.filter((c) => c !== card) });
    } else if (curr.length < 2) {
      const next = [...curr, card];
      setCards({ ...cards, [pickingFor]: next });
      if (next.length === 2) setPickingFor(null); // auto-close picker after 2 cards
    }
  };

  return (
    <div className="modal-bg" onClick={(e) => {
      if (e.target === e.currentTarget) onClose();
    }}>
      <div className="modal modal-wide">
        <div className="modal-head">
          <h3>SHOWDOWN</h3>
          <button className="modal-close" onClick={onClose}><X size={14}/></button>
        </div>
        <div className="modal-body">
          {survivors.map((seatIdx) => {
            const player = getPlayerForSeat(seatIdx);
            const pos = hand.positions[seatIdx];
            const playerCards = cards[seatIdx] || [];
            const isPicking = pickingFor === seatIdx;
            return (
              <div key={seatIdx} className={`sd-row ${isPicking ? "sd-active" : ""}`}>
                <div className="sd-name">
                  <span className="sd-pos">{pos}</span>
                  <span>{player?.name || "?"}</span>
                </div>
                <div className="sd-cards">
                  {playerCards.map((c, i) => (
                    <span key={i} className="sd-card-badge" onClick={() => {
                      setCards({ ...cards, [seatIdx]: playerCards.filter((_, j) => j !== i) });
                    }}>
                      {c[0]}<span style={{ color: SUITS.find(s => s.key === c[1])?.color }}>{SUITS.find(s => s.key === c[1])?.symbol}</span>
                    </span>
                  ))}
                  {playerCards.length < 2 && (
                    <button className="sd-pick-btn" onClick={() => setPickingFor(isPicking ? null : seatIdx)}>
                      {isPicking ? "✕" : "+"}
                    </button>
                  )}
                </div>
              </div>
            );
          })}

          {pickingFor !== null && (
            <div className="card-picker">
              {SUITS.map((suit) => (
                <div key={suit.key} className="cp-suit-row">
                  {RANKS.map((rank) => {
                    const card = rank + suit.key;
                    const used = usedCards.has(card) && !(cards[pickingFor] || []).includes(card);
                    const selected = (cards[pickingFor] || []).includes(card);
                    return (
                      <button
                        key={card}
                        className={`cp-card ${selected ? "selected" : ""} ${used ? "used" : ""}`}
                        style={{ color: suit.color }}
                        onClick={() => !used && toggleCard(card)}
                        disabled={used}
                      >
                        <span className="cp-rank">{rank}</span>
                        <span className="cp-suit">{suit.symbol}</span>
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="modal-foot">
          <button className="btn" onClick={onClose}>annuler</button>
          <button className="next-hand" onClick={() => onValidate(cards)}>VALIDER & NEXT</button>
        </div>
      </div>
    </div>
  );
}

/* ── SESSION HISTORY MODAL ── */
function SessionHistoryModal({ history, onClose }) {
  const fmtDur = (s) => {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return h > 0 ? `${h}h${String(m).padStart(2,"0")}` : `${m}min`;
  };
  const sorted = [...history].reverse();
  return (
    <div className="modal-bg" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal modal-wide">
        <div className="modal-head">
          <h3>SESSION HISTORY</h3>
          <button className="modal-close" onClick={onClose}><X size={14}/></button>
        </div>
        <div className="modal-body" style={{ maxHeight: "70vh", overflowY: "auto" }}>
          {sorted.length === 0 && <p className="opt-hint">Aucune session terminée.</p>}
          {sorted.map((s, i) => (
            <div key={i} className="sh-row">
              <div className="sh-id">#{s.id}</div>
              <div className="sh-details">
                <span className="sh-room">{s.room || "—"}</span>
                <span className="sh-blind">{s.blind || "—"}</span>
              </div>
              <div className="sh-meta">
                <span>{s.handCount} hands</span>
                <span>{fmtDur(s.duration)}</span>
                <span className="sh-date">{new Date(s.date).toLocaleDateString()}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── PLAYER OBSERVER MODAL ── */
function PlayerObserverModal({ playerDB, setPlayerDB, rooms, selected, onSelect, onClose }) {
  const [viewMode, setViewMode] = useState("global");
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editRoom, setEditRoom] = useState("");
  const [newName, setNewName] = useState("");
  const [newRoom, setNewRoom] = useState("");
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [search, setSearch] = useState("");
  const [addMsg, setAddMsg] = useState(null);

  const addPlayers = () => {
    const raw = newName.trim();
    if (!raw) return;
    const names = raw.split(",").map((n) => normalizeName(n)).filter(Boolean);
    let added = 0;
    const dupes = [];
    setPlayerDB((prev) => {
      let next = [...prev];
      names.forEach((name) => {
        if (isRandomName(name)) return;
        if (next.some((p) => normalizeName(p.name) === name)) {
          dupes.push(name);
          return;
        }
        const id = `p_${Date.now()}_${Math.random().toString(36).slice(2, 7)}_${added}`;
        next = [...next, { id, name, room: newRoom || "", sessionStats: emptyStats(), globalStats: emptyStats() }];
        added++;
      });
      return next;
    });
    if (dupes.length > 0) {
      setAddMsg(`Doublon: ${dupes.join(", ")}`);
      setTimeout(() => setAddMsg(null), 3000);
    }
    if (added > 0) { setNewName(""); }
  };

  if (selected === "_list") {
    const players = playerDB.filter((p) => p.id !== "hero");
    const q = normalizeName(search);
    const filtered = q ? players.filter((p) => normalizeName(p.name).includes(q)) : players;
    return (
      <div className="modal-bg" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
        <div className="modal modal-wide" style={{ display: "flex", flexDirection: "column", maxHeight: "85vh" }}>
          <div className="modal-head">
            <h3>PLAYER OBSERVER</h3>
            <button className="modal-close" onClick={onClose}><X size={14}/></button>
          </div>
          <div className="po-search-bar">
            <input className="ss-input" placeholder="🔍 Rechercher..."
              value={search} onChange={(e) => setSearch(e.target.value)}/>
          </div>
          <div className="modal-body" style={{ flex: 1, overflowY: "auto", overscrollBehavior: "contain", paddingBottom: 8 }}>
            {filtered.length === 0 && <p className="opt-hint">{q ? "Aucun résultat." : "Aucun joueur en base."}</p>}
            {filtered.map((p) => (
              <div key={p.id} className="po-player-row">
                {confirmDeleteId === p.id ? (
                  <div className="po-confirm-row">
                    <span className="po-confirm-text">Supprimer {p.name} ?</span>
                    <button className="act act-danger" onClick={() => {
                      setPlayerDB((prev) => prev.filter(pp => pp.id !== p.id));
                      setConfirmDeleteId(null);
                    }}>SUPPRIMER</button>
                    <button className="act act-neutral" onClick={() => setConfirmDeleteId(null)}>ANNULER</button>
                  </div>
                ) : editingId === p.id ? (
                  <div className="po-edit-row">
                    <input className="ss-input ss-input-sm" value={editName}
                      onChange={(e) => setEditName(e.target.value)}/>
                    <select className="ss-select" value={editRoom}
                      onChange={(e) => setEditRoom(e.target.value)}>
                      <option value="">—</option>
                      {rooms.map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                    <button className="ss-add-btn" onClick={() => {
                      const nn = normalizeName(editName);
                      setPlayerDB((prev) => prev.map((pp) =>
                        pp.id === p.id ? { ...pp, name: nn || pp.name, room: editRoom } : pp
                      ));
                      setEditingId(null);
                    }}>✓</button>
                    <button className="ss-add-btn" onClick={() => setEditingId(null)}>✕</button>
                  </div>
                ) : (
                  <>
                    <button className="po-player-btn" onClick={() => onSelect(p)}>
                      <span className="po-name">{p.name}</span>
                      <span className="po-room">{p.room || "—"}</span>
                      <span className="po-hands">{(p.globalStats || emptyStats()).hands}h</span>
                      <ChevronRight size={12}/>
                    </button>
                    <div className="po-actions">
                      <button className="ss-edit-btn" onClick={() => {
                        setEditingId(p.id);
                        setEditName(p.name);
                        setEditRoom(p.room || "");
                      }}>✎</button>
                      <button className="ss-del-btn" onClick={() => setConfirmDeleteId(p.id)}>
                        <Trash2 size={10}/>
                      </button>
                    </div>
                  </>
                )}
              </div>
            ))}
          </div>

          {/* Fixed add section at bottom */}
          <div className="po-add-fixed">
            {addMsg && <p className="po-add-msg">{addMsg}</p>}
            <div className="po-add-row">
              <input className="ss-input" placeholder="Nom ou noms séparés par ,"
                value={newName} onChange={(e) => setNewName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addPlayers()}/>
              <select className="ss-select" value={newRoom}
                onChange={(e) => setNewRoom(e.target.value)}>
                <option value="">Room —</option>
                {rooms.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
              <button className="ss-add-btn" onClick={addPlayers}><Plus size={12}/></button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Detailed view for a specific player
  const p = selected;
  const stats = viewMode === "global" ? (p.globalStats || emptyStats()) : (p.sessionStats || emptyStats());

  return (
    <div className="modal-bg" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal modal-wide">
        <div className="modal-head">
          <button className="modal-back" onClick={() => onSelect("_list")}>← BACK</button>
          <h3>{p.name}</h3>
          <button className="modal-close" onClick={onClose}><X size={14}/></button>
        </div>
        <div className="modal-body" style={{ maxHeight: "70vh", overflowY: "auto" }}>
          <div className="po-toggle">
            <button className={`tog ${viewMode === "session" ? "on" : ""}`}
              onClick={() => setViewMode("session")}>SESSION</button>
            <button className={`tog ${viewMode === "global" ? "on" : ""}`}
              onClick={() => setViewMode("global")}>GLOBAL</button>
          </div>
          <div className="po-meta">
            <span>Room: {p.room || "—"}</span>
            <span>Hands: {stats.hands}</span>
          </div>
          <div className="po-stats-grid">
            {STAT_KEYS.map((k) => {
              const s = stats[k] || { opp: 0, act: 0 };
              const v = pct(s.opp, s.act);
              return (
                <div key={k} className="po-stat">
                  <span className="po-stat-label">{STAT_LABELS[k] || k}</span>
                  <span className="po-stat-val" style={{ color: statColor(v, k) }}>{fmt(v)}</span>
                  <span className="po-stat-frac">{s.act}/{s.opp}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

  box-shadow: inset 2px 0 0 0 #ff8a3c, 0 0 12px rgba(255,138,60,0.4);
}
.row.folded { opacity: 0.32; }
.row.open { opacity: 0.6; border-style: dashed; }

/* SEAT OPEN & BREAK */
.row.seat-open, .row.seat-break {
  opacity: 0.5;
  border-style: dashed;
  background: rgba(5,6,10,0.5);
}
.row.seat-open {
  border-color: #ff4d4d;
  opacity: 0.45;
}
.row.seat-break {
  border-color: var(--cy-yellow);
  opacity: 0.6;
}
.inactive-name {
  color: var(--dim) !important;
  font-style: italic;
  text-shadow: none !important;
}
.tag-seatopen {
  color: #ff4d4d !important;
  border-color: rgba(255,77,77,0.4) !important;
  background: rgba(255,77,77,0.1) !important;
  text-shadow: none !important;
}
.tag-break {
  color: var(--cy-yellow) !important;
  border-color: rgba(255,244,90,0.5) !important;
  background: rgba(255,244,90,0.1) !important;
}

/* SWAP MODE (tap to select, tap another to swap) */
.row.swap-from {
  border-color: var(--cy-cyan) !important;
  background: rgba(0,245,255,0.12) !important;
  box-shadow: 0 0 16px rgba(0,245,255,0.3);
}
.row.swap-target {
  cursor: pointer;
  border-color: var(--cy-pink) !important;
  border-style: dashed !important;
}
.row.swap-target:active {
  background: rgba(255,42,109,0.15) !important;
}
.swap-label {
  color: var(--cy-cyan) !important;
  font-size: 9px !important;
  font-weight: 700 !important;
  letter-spacing: 0.1em;
}
.swap-label-target {
  color: var(--cy-pink) !important;
  font-size: 9px !important;
  font-weight: 700 !important;
  letter-spacing: 0.1em;
  animation: pulse-pink 1s ease-in-out infinite;
}
@keyframes pulse-pink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.swap-hint {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-pink);
  letter-spacing: 0.1em;
  padding: 6px;
  animation: pulse-pink 1s ease-in-out infinite;
}

.row-menu-btn {
  width: 20px;
  height: 32px;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--line);
  color: var(--cy-cyan);
  font-weight: 700;
  font-size: 16px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  flex-shrink: 0;
}
.row-menu-btn:active { background: rgba(0,245,255,0.15); }

.row-left {
  display: flex; align-items: flex-start; gap: 6px;
  min-width: 0; flex: 1;
}
.row-info {
  display: flex; flex-direction: column;
  gap: 1px;
  min-width: 0; flex: 1;
  padding-top: 3px;
}
.row-tag-inline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em;
}
.tag-color-seatopen { color: #ff4d4d; }
.tag-color-break { color: var(--cy-yellow); }
.row-actions-history {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.action-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 0;
  line-height: 1.2;
}
/* action colors — no border, just colored text */
.action-fold { color: var(--dim); }
.action-limp, .action-call, .action-check { color: var(--cy-yellow); }
.action-open, .action-iso { color: var(--cy-purple); }
.action-3bet, .action-4bet, .action-5bet, .action-6bet, .action-sqz { color: var(--cy-pink); }
.action-win { color: #ffd84a; }
.row-pos {
  display: flex; align-items: center;
  justify-content: center;
  flex-shrink: 0;
  min-width: 32px;
  align-self: stretch;
  position: relative;
}
.pos-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--cy-cyan);
  text-transform: uppercase;
  font-weight: 800;
  line-height: 1;
  padding: 2px 3px;
  text-align: center;
  min-width: 28px;
  display: flex; align-items: center; justify-content: center;
  height: 100%;
  border-right: 1px solid currentColor;
  background: rgba(0,245,255,0.08);
}
.seat-id {
  position: absolute;
  bottom: -1px; left: calc(100% + 0px);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  opacity: 0.8;
  line-height: 0.7;
}
/* Position-specific colors */
.pos-bu, .pos-busb {
  color: #ffd84a;
  background: rgba(255,216,74,0.12);
  text-shadow: 0 0 6px rgba(255,216,74,0.4);
}
.pos-sb {
  color: #8fffb0;
  background: rgba(143,255,176,0.1);
}
.pos-bb {
  color: #ff8a3c;
  background: rgba(255,138,60,0.15);
  text-shadow: 0 0 5px rgba(255,138,60,0.4);
}
.pos-str {
  color: #ff5c8a;
  background: rgba(255,92,138,0.15);
  text-shadow: 0 0 5px rgba(255,92,138,0.4);
}
.pos-msp {
  color: #ff5c8a;
  background: rgba(255,92,138,0.15);
  text-shadow: 0 0 5px rgba(255,92,138,0.4);
}

.row-name {
  background: transparent; border: none;
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 600; font-size: 15px;
  color: var(--ink);
  text-align: left;
  padding: 0; margin: 0;
  cursor: pointer;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: 0.02em;
  min-width: 0;
}
.row-name.muted { color: var(--dim); font-style: italic; font-weight: 400; }
.row-name.edit {
  outline: none;
  color: var(--cy-pink);
  border-bottom: 1px solid var(--cy-pink);
  min-width: 100px;
}
.hero-name {
  color: #ff8a3c; font-weight: 700;
  text-shadow: 0 0 8px rgba(255,138,60,0.4);
}
.random-name {
  color: var(--dim);
  font-style: italic;
  font-weight: 500;
  font-size: 13px;
}

.row-last {
  margin-left: auto;
  padding: 2px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 9.5px;
  letter-spacing: 0.08em;
  line-height: 1.3;
  border: 1px solid currentColor;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  flex-shrink: 0;
}
.tag-fold { color: var(--dim); border-color: var(--faint); background: transparent; }
.tag-limp, .tag-call, .tag-check {
  color: var(--cy-yellow);
  background: rgba(255,244,90,0.12);
}
.tag-open, .tag-iso {
  color: var(--cy-purple);
  background: rgba(178,124,255,0.18);
}
.tag-3bet, .tag-4bet, .tag-5bet, .tag-6bet, .tag-sqz {
  color: var(--cy-pink);
  background: rgba(255,42,109,0.2);
  text-shadow: 0 0 4px rgba(255,42,109,0.4);
}
.tag-win {
  color: #ffd84a;
  background: rgba(255,216,74,0.2);
  text-shadow: 0 0 6px rgba(255,216,74,0.5);
  font-weight: 800;
}

.row-right {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── ACTION BUTTONS ───────────────────────────────────────────────── */
.act-row {
  display: flex;
  gap: 4px;
}
.act {
  padding: 7px 10px;
  min-width: 50px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.05em;
  border: 1px solid var(--line);
  background: rgba(5,6,10,0.92);
  color: var(--ink);
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  transition: transform 80ms, background 120ms;
  text-align: center;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
}
.act:active { transform: scale(0.92); }
.act.act-mute {
  color: var(--ink-soft);
  border-color: var(--faint);
  background: rgba(53,70,80,0.2);
}
.act.act-mute:active { background: rgba(53,70,80,0.5); }
.act.act-neutral {
  color: var(--cy-yellow);
  border-color: rgba(255,244,90,0.5);
  background: rgba(255,244,90,0.08);
}
.act.act-neutral:active { background: rgba(255,244,90,0.25); }
.act.act-accent {
  color: #fff;
  border-color: var(--cy-pink);
  background: rgba(255,42,109,0.18);
  box-shadow: 0 0 6px rgba(255,42,109,0.3);
}
.act.act-accent:active {
  background: var(--cy-pink);
  box-shadow: 0 0 12px var(--cy-pink);
}
.act.act-danger {
  color: #ff4d4d;
  border-color: #ff4d4d;
  background: rgba(255,77,77,0.12);
}
.act.act-danger:active { background: rgba(255,77,77,0.3); }
.act.act-warn {
  color: var(--cy-yellow);
  border-color: var(--cy-yellow);
  background: rgba(255,244,90,0.1);
}
.act.act-warn:active { background: rgba(255,244,90,0.25); }

.row-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
  padding: 0 8px;
}
.row-status.muted { opacity: 0.4; }

/* ── REORDER MODE ─────────────────────────────────────────────────── */
.reorder-ctrls { display: flex; gap: 3px; }
.rc-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.05);
  color: var(--cy-cyan);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 14px;
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  display: inline-flex; align-items: center; justify-content: center;
}
.rc-btn:active { background: rgba(0,245,255,0.2); }
.rc-btn.warn { color: var(--cy-pink); border-color: var(--line-hot); }

/* ── NAME MODAL ───────────────────────────────────────────────────── */
.name-modal {
  max-width: 440px;
  width: 100%;
}
.name-input {
  width: 100%;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--cy-cyan);
  color: var(--ink);
  padding: 12px 14px;
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 600;
  font-size: 17px;
  outline: none;
  letter-spacing: 0.02em;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.name-input:focus {
  border-color: var(--cy-pink);
  box-shadow: 0 0 10px rgba(255,42,109,0.4);
}
.name-input::placeholder {
  color: var(--dim);
  font-weight: 400;
  font-style: italic;
}
.name-actions {
  display: flex; gap: 6px;
  flex-wrap: wrap;
}
.name-btn {
  flex: 1;
  min-width: 140px;
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  border: none;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.name-btn.create {
  background: var(--cy-pink);
  color: #fff;
  box-shadow: 0 0 10px rgba(255,42,109,0.4);
}
.name-btn.create:active { background: #fff; color: var(--cy-pink); }
.name-btn.rename {
  background: var(--cy-yellow);
  color: var(--bg);
}
.name-btn.rename:active { background: #fff; }
.name-btn.rename-reset {
  background: transparent;
  color: var(--cy-pink);
  border: 1px solid var(--cy-pink);
}
.name-btn.rename-reset:active { background: rgba(255,42,109,0.15); }

.name-divider {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px;
}
.name-divider::before, .name-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}
.name-divider span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-cyan);
  letter-spacing: 0.2em;
  opacity: 0.7;
}

.name-list {
  display: flex; flex-direction: column;
  gap: 2px;
  max-height: 260px;
  overflow-y: auto;
  border: 1px solid var(--line);
  background: rgba(0,0,0,0.3);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.name-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(0,245,255,0.08);
  color: var(--ink);
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  width: 100%;
}
.name-item:active { background: rgba(0,245,255,0.12); }
.name-item:last-child { border-bottom: none; }
.name-item-seated {
  opacity: 0.3;
  cursor: not-allowed;
  pointer-events: none;
}
.ni-name { font-weight: 600; }
.ni-seated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  color: var(--cy-yellow);
  letter-spacing: 0.1em;
  padding: 1px 4px;
  border: 1px solid rgba(255,216,74,0.3);
}
.ni-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.12em;
}
.name-empty {
  padding: 20px;
  text-align: center;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  font-style: italic;
}

/* ── STATS TABLE ──────────────────────────────────────────────────── */
.stats { margin-top: 16px; }
.stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; padding: 0 4px;
}
.stats-head h2 {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.2em; margin: 0;
  color: var(--cy-cyan);
  text-shadow: 0 0 6px rgba(0,245,255,0.3);
}
.stats-toggle {
  display: flex; gap: 0;
  border: 1px solid var(--line);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.tog {
  padding: 4px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.15em;
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
}
.tog.on {
  background: var(--cy-cyan);
  color: var(--bg);
}
.stats-scroll {
  border: 1px solid var(--line);
  overflow-x: auto;
  background: rgba(0,245,255,0.02);
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}
.stats-grid {
  display: grid;
  min-width: 100%;
}
.sh, .sc {
  padding: 5px 4px;
  border-bottom: 1px solid rgba(0,245,255,0.08);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
}
.sh {
  background: rgba(0,245,255,0.07);
  color: var(--cy-cyan);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 8px; font-weight: 700;
  border-bottom: 1px solid var(--cy-cyan);
  text-align: center;
  white-space: nowrap;
}
.sh:first-child { text-align: left; }
.sc {
  display: flex; flex-direction: column; gap: 1px;
  align-items: center; justify-content: center;
}
.sc.name {
  font-family: 'Chakra Petch', sans-serif;
  font-weight: 600; font-size: 11px;
  align-items: flex-start; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sc.hero-row {
  color: var(--cy-cyan); font-weight: 700;
  text-shadow: 0 0 6px rgba(0,245,255,0.4);
}
.sc.random-row {
  color: var(--dim);
  font-style: italic;
  font-weight: 500;
}
.sc.dim { color: var(--dim); }
.sc.mono { font-family: 'JetBrains Mono', monospace; }
.sc-val { font-size: 12px; font-weight: 700; line-height: 1; }
.sc-frac { color: var(--dim); font-size: 7px; line-height: 1; opacity: 0.7; }

/* Stat cell clickable */
.sc-clickable {
  cursor: pointer;
}
.sc-clickable:active { background: rgba(0,245,255,0.1); }
.sc-active {
  background: rgba(255,42,109,0.12) !important;
  border: 1px solid var(--cy-pink);
}

/* Drill row (inline position breakdown) */
.drill-row {
  background: rgba(0,245,255,0.03);
  border-top: 1px solid var(--cy-pink);
  border-bottom: 1px solid var(--cy-pink);
  padding: 8px;
}
.drill-row-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--cy-cyan);
  letter-spacing: 0.1em;
}
.drill-close {
  background: transparent; border: none;
  color: var(--dim); cursor: pointer;
}
.drill-row-cols {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.drill-na {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
  font-style: italic;
}
.drill-col {
  display: flex; flex-direction: column; align-items: center;
  min-width: 36px;
  padding: 4px 5px;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--faint);
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}
.drill-col-pos {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; font-weight: 700;
  color: var(--cy-cyan);
  letter-spacing: 0.08em;
}
.drill-col-val {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px; font-weight: 700;
  line-height: 1.1;
}
.drill-col-frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; color: var(--dim);
  opacity: 0.6;
}
.drill-col-sd { cursor: pointer; }
.drill-col-sd:active { background: rgba(255,216,74,0.15); }
.drill-sd-badge {
  font-size: 8px;
  color: var(--cy-yellow);
  margin-top: 1px;
}
.drill-sd-list {
  display: flex; flex-direction: column; gap: 2px;
  margin-top: 3px;
  padding-top: 3px;
  border-top: 1px solid var(--faint);
}
.drill-sd-hand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--cy-yellow);
  letter-spacing: 0.05em;
}

.stats-footer {
  display: flex; gap: 12px; justify-content: flex-end;
  margin-top: 6px; padding: 0 4px;
}
.reset-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--faint);
}
.reset-link.danger { color: var(--cy-pink); text-decoration-color: var(--line-hot); }

/* ── MODALS ───────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(5,6,10,0.85);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 16px;
  overscroll-behavior: contain;
  overflow: hidden;
  touch-action: none;
}
.modal {
  background: var(--bg-2);
  border: 1px solid var(--cy-cyan);
  box-shadow: 0 0 30px rgba(0,245,255,0.4);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  display: flex; flex-direction: column;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 {
  margin: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; letter-spacing: 0.2em;
  color: var(--cy-cyan);
}
.modal-close {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  cursor: pointer;
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
}
.modal-body {
  padding: 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}
.modal-foot {
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 12px 16px;
  border-top: 1px solid var(--line);
}
.opt-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px;
  color: var(--ink);
}
.opt-row input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--cy-cyan);
}
.opt-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.05em;
  margin: 4px 0 0;
}
.sd-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--line);
}
.sd-row.sd-active {
  border-color: var(--cy-cyan);
  background: rgba(0,245,255,0.05);
}
.sd-name {
  display: flex; flex-direction: column; gap: 2px;
  flex-shrink: 0;
  width: 90px;
}
.sd-pos {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--cy-cyan);
  letter-spacing: 0.1em;
}
.sd-name span:last-child {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 13px;
  font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sd-cards {
  display: flex; align-items: center; gap: 6px; flex: 1;
}
.sd-card-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700;
  background: rgba(0,245,255,0.1);
  border: 1px solid var(--line);
  padding: 4px 6px;
  cursor: pointer;
}
.sd-card-badge:active { opacity: 0.5; }
.sd-pick-btn {
  width: 28px; height: 28px;
  background: rgba(0,245,255,0.08);
  border: 1px dashed var(--cy-cyan);
  color: var(--cy-cyan);
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.sd-pick-btn:active { background: rgba(0,245,255,0.2); }

/* Card picker grid */
.card-picker {
  margin-top: 12px;
  display: flex; flex-direction: column; gap: 3px;
  padding: 8px;
  background: rgba(5,6,10,0.8);
  border: 1px solid var(--line);
}
.cp-suit-row {
  display: flex; gap: 2px; justify-content: center;
}
.cp-card {
  width: 26px; height: 34px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(20,25,40,0.9);
  border: 1px solid var(--faint);
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  padding: 0;
  gap: 0;
}
.cp-card:active { background: rgba(0,245,255,0.15); }
.cp-rank { font-size: 10px; font-weight: 700; line-height: 1; }
.cp-suit { font-size: 10px; line-height: 1; }
.cp-card.selected {
  background: rgba(0,245,255,0.25);
  border-color: var(--cy-cyan);
  box-shadow: 0 0 8px rgba(0,245,255,0.4);
}
.cp-card.used {
  opacity: 0.15;
  cursor: not-allowed;
}
.modal-wide { max-width: 420px; }
.modal-back {
  background: transparent; border: none;
  color: var(--cy-cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  cursor: pointer; padding: 4px 8px;
  letter-spacing: 0.1em;
}
.modal-back:active { color: var(--ink); }

/* Session History */
.sh-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.sh-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  color: var(--cy-cyan);
  min-width: 32px;
}
.sh-details {
  display: flex; flex-direction: column; gap: 2px; flex: 1;
}
.sh-room {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 12px; font-weight: 600; color: var(--ink);
}
.sh-blind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--dim);
}
.sh-meta {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
}
.sh-date { color: var(--faint); }

/* Player Observer */
.po-player-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 4px;
  background: transparent; border: none;
  border-bottom: 1px solid var(--line);
  cursor: pointer; text-align: left;
  color: var(--ink);
}
.po-player-btn:active { background: rgba(0,245,255,0.05); }
.po-name {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 14px; font-weight: 600;
  flex: 1;
}
.po-room {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--dim);
}
.po-hands {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--cy-cyan);
}
.po-toggle {
  display: flex; gap: 4px; margin-bottom: 10px;
}
.po-meta {
  display: flex; gap: 16px; margin-bottom: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--dim);
}
.po-stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.po-stat {
  display: flex; flex-direction: column;
  padding: 6px 8px;
  background: rgba(0,245,255,0.04);
  border: 1px solid var(--line);
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
}
.po-stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 700;
  color: var(--cy-cyan);
  letter-spacing: 0.15em;
  opacity: 0.7;
}
.po-stat-val {
  font-family: 'Chakra Petch', sans-serif;
  font-size: 18px; font-weight: 700;
  line-height: 1.1;
}
.po-stat-frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; color: var(--dim);
  opacity: 0.6;
}

/* ── SETTINGS ────────────────────────────────────────────────────── */
.settings-section {
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.settings-section:last-child { border-bottom: none; margin-bottom: 0; }
.ss-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--cy-cyan);
  display: block; margin-bottom: 8px;
}
.ss-chips {
  display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px;
}
.ss-chip {
  padding: 5px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  border: 1px solid var(--line);
  background: rgba(0,245,255,0.04);
  color: var(--dim);
  cursor: pointer;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.ss-chip.on {
  background: var(--cy-cyan);
  color: var(--bg);
  border-color: var(--cy-cyan);
}
.ss-chip:active { opacity: 0.7; }
.ss-add-row {
  display: flex; gap: 4px;
}
.ss-input {
  flex: 1;
  background: rgba(0,245,255,0.05);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 5px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
}
.ss-input:focus { border-color: var(--cy-cyan); }
.ss-input-sm { max-width: 100px; }
.ss-add-btn {
  padding: 5px 8px;
  background: rgba(0,245,255,0.08);
  border: 1px solid var(--line);
  color: var(--cy-cyan);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.ss-add-btn:active { background: rgba(0,245,255,0.2); }
.ss-select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 6px;
  outline: none;
}
.ss-player-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 200px; overflow-y: auto;
}
.ss-player-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid var(--faint);
}
.ss-pname {
  flex: 1;
  font-family: 'Chakra Petch', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ss-proom {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.1em;
}
.ss-edit-btn, .ss-del-btn {
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
  padding: 3px 4px;
  font-size: 12px;
}
.ss-edit-btn:active, .ss-del-btn:active { color: var(--cy-cyan); }
.ss-del-btn { color: var(--cy-pink); }
.ss-del-btn:active { color: #ff6090; }
`;

root.render(React.createElement(App));
